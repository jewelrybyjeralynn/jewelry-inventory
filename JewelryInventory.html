JEWELRY INVENTORY APP
================================================================================

--------------------------------------------------------------------------------
ARCHITECTURE
--------------------------------------------------------------------------------
- Single HTML/JS/CSS file, no server, no build step
- Data source: Google Sheets published CSVs (auto-publishes on save)
- Writes: Google Apps Script Web App (no-cors POST)
- Left pane: SKU list grouped by Packaging SKU (siblings share a group)
- Right pane: Detail view (click item to show)
- Modal: Add New SKU / Add Component / Edit SKU
--------------------------------------------------------------------------------
GOOGLE SHEETS
--------------------------------------------------------------------------------
Spreadsheet published base URL:
  https://docs.google.com/spreadsheets/d/e/2PACX-1vSY-d6fqtTZhGzIoE4w_q3J4AAGpL1By7Jsc8RBVspYU6r8Fx4l71Xmx7WwR69vBwevSi63WnqJnaXO/pub

Tabs:
  Listings_Published        gid=1428673260  (main inventory, read+write)
  Findings_SKUs_Published   gid=1709919881  (chain/hardware options, read only)
  Abbreviations_Published   gid=1879145246  (type/shape/finish/color/material abbrevs, read+write)

Listings_Published columns (0-indexed):
  0:Type  1:Shape  2:Packaging SKU  3:New ETSY SKU  4:Characters
  5:Object Description  6:Wide x Height  7:Material  8:Chain Or Hardware
  9:Chain Or Drop Length  10:Chain/Bead/Clasp Details  11:Extension Chain
  12:Chain Length Config  13:Finish  14:Colors  15:Charm  16:Double Sided
  17:Gift Box  18:Added To Etsy  19:Jump Rings  20:Jump Rings Qty  21:Old SKU
  22:ETSY ListingID  23:ETSY SKU  24:ETSY Title  25:ETSY Status  26:ETSY Price
  27:ETSY URL  28:Update Templates  29:Template - Title Custom Intro
  30:Template - Components Necklace Length Options
  31:Template - Combined  32:Template - Tags
  33:Added_Timestamp  34:Row_ID  35:API_Edit
  (Note: col 29=Title Custom Intro, 30=Components Necklace Length Options)

Apps Script URL:
  https://script.google.com/macros/s/AKfycbwOZhzM_eUsSF9QuWdgblsEHVKWg2OIIGkvBC1Z6na58cGXDV3zd4ZA_nB19_caI22T/exec

Apps Script actions:
  append        - Add new row to Listings_Published
  update        - Update row matched by Packaging SKU + Object Description
  updateSKU     - Update Packaging SKU + New ETSY SKU on ALL rows matching old PKG SKU
  addFinishAbbr - Append new finish abbreviation entry to Abbreviations_Published
--------------------------------------------------------------------------------
KEY BEHAVIORS
--------------------------------------------------------------------------------
- SET types (SET-PD, SET-ER, SET-BR) group as siblings under same Packaging SKU
- SKU auto-generates: TypeParent-Shape-ChainMetal-Finish[-Colors]
  * Packaging SKU: readable form e.g. FlameMatte, max 38 chars
  * New ETSY SKU: abbreviated form e.g. FM, max 32 chars
- SET SKU combines PD+ER shapes after first non-PD component saved; locks after that
- Chain Or Hardware filtered by Type:
    ER/SET-ER  → EAR options only
    KC         → Keychain options only
    BR/SET-BR  → includes BRACELET options; others exclude BRACELET
    JD/PKG     → disabled
    All others → excludes EAR and Keychain
- Finish: checkboxes (11 base finishes + No Finish, alphabetical, 4 columns)
  "Different Front/Back" toggle splits into Front/Back groups (2 cols each)
  New combos auto-written to Abbreviations_Published via addFinishAbbr
  "No Finish" (SKIP) is mutually exclusive with all other finishes; produces no
  finish segment in the SKU
  Aluminum removed from finish checkboxes — set automatically by material logic
- Material auto-finish rules:
    Aluminum        → finish forced to "Aluminum", finish panel disabled
    Stainless Steel → finish forced to "Stainless Steel", finish panel disabled
  Note: SS in the SKU comes from Chain Or Hardware metal, not finish
- Colors: tag-input autocomplete widget (replaced checkbox grid)
  Type partial name to filter (e.g. "gre" → Green), Enter or click to add tag
  Tags show full name with × to remove; Backspace removes last tag
  Stored in sheet as full names comma-separated; abbreviations used in SKU
  Color list sourced from Abbreviations_Published Colors column (32 colors)
  Colors Backup column in sheet is historical reference only, not used in app
- Search: strips hyphens and spaces before comparing, so "setpenguin" finds
  "SET-Penguin-..." and "dolphinpendant" finds "Dolphin Pendant"
- Type dropdown order matches Abbreviations_Published Type column order
- Extension Chain and Chain Length Config only enabled for NK, PD, and SET-PD
- Detail view column order (Chain & Hardware section):
    Chain Or Hardware | Chain Or Drop Length | Extension Chain | Chain/Bead/Clasp Details
- Double-click a component in SKU Group list → opens Edit modal for that component
- Favicon: copper diamond PNG embedded as base64 inline

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewelry Inventory</title>
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAA/UlEQVR4nNWXwRHCMAwEhTqhBpqgCT60kDpogQ9N0AQ1UAr8mMQjWXenfNDPiaNd23LGNvv3eC6nT+d73wPekZAFRqgqIQlkMEWCFqggrAQlgCZnJGABdmRof0hgluz6eLckSgEE3pGYCjAjVyVSAWXaFYlQQF1zReLQgd8vR+jdGOfb68fdzIAKj9roTHj0kIV3JJyFs1FJuNl2TcaYrSUSVS34uoEmQbchUogePVQk1F0QArs1gcLNkh9RpyYYeCqgSrDwqQArocBLAVRChZslRRiFcuCs4GbEkQxJpvSnDqVoUkaWPpZXydmZki4mGYSFywIRTIHvEt3b8ReXFrtKFbmemwAAAABJRU5ErkJggg==">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
  :root {
    --bg:#1a1612;--surface:#231f1a;--surface2:#2e2923;--border:#3d3730;
    --copper:#b87333;--copper-light:#d4944a;--copper-dim:#7a4d22;
    --text:#e8ddd0;--text-dim:#9a8a7a;--text-muted:#5a4e44;
    --active-bg:#1a3d25;--expired:#7a2020;--inactive:#4a4020;--sold:#203a5a;
    --green:#4caf76;--yellow:#c8a840;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;font-size:13px;}

  /* LOADING */
  #loadingScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:-webkit-fill-available;gap:20px;}
  .load-logo{font-family:'Libre Baskerville',serif;font-size:26px;color:var(--copper);}
  .load-msg{color:var(--text-muted);font-size:12px;}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--copper);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .load-error{color:#e07070;font-size:12px;background:rgba(200,50,50,.1);border:1px solid rgba(200,50,50,.3);padding:12px 18px;max-width:480px;text-align:center;line-height:1.6;display:none;}
  .retry-btn{background:var(--copper);color:var(--bg);border:none;padding:8px 18px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;margin-top:6px;}
  .retry-btn:hover{background:var(--copper-light);}

  /* APP */
  #appScreen{display:none;flex-direction:column;height:100vh;height:-webkit-fill-available;}
  header{border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;gap:14px;background:var(--surface);flex-shrink:0;}
  .logo{font-family:'Libre Baskerville',serif;font-size:15px;color:var(--copper);white-space:nowrap;}
  .logo span{color:var(--text-muted);font-size:10px;font-family:'DM Mono',monospace;margin-left:6px;}
  .search-wrap{flex:1;position:relative;}
  #search{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px 7px 28px;font-family:'DM Mono',monospace;font-size:12px;outline:none;}
  #search:focus{border-color:var(--copper);}
  #search::placeholder{color:var(--text-muted);}
  .si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;}
  #filterBar{display:none;gap:7px;align-items:center;flex-wrap:wrap;padding:6px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
  @media(min-width:701px){#filterBar{display:flex;}#filterBar .btn:first-of-type{margin-left:auto;}}
  .filter-wrap{display:flex;flex-direction:column;gap:3px;}
  .filter-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
  select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;font-family:'DM Mono',monospace;font-size:11px;outline:none;cursor:pointer;}
  select:focus{border-color:var(--copper);}
  .btn{background:var(--copper);color:var(--bg);border:none;padding:7px 13px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .15s;}
  .btn:hover{background:var(--copper-light);}
  .btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn.sec:hover{border-color:var(--copper);color:var(--copper);}
  .btn.rel{background:transparent;color:var(--text-muted);border:1px solid var(--border);font-size:11px;}
  .btn.rel:hover{border-color:var(--copper-dim);color:var(--copper);}

  .main{display:flex;flex:1;overflow:hidden;}
  .list-pane{width:390px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .list-hdr{padding:7px 13px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:11px;background:var(--surface);display:flex;justify-content:space-between;flex-shrink:0;}
  .list-scroll{flex:1;overflow-y:auto;}
  .sku-item{padding:8px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:grid;grid-template-columns:1fr auto;gap:3px;}
  .sku-item:hover{background:var(--surface);}
  .sku-item.active{background:var(--surface2);border-left:2px solid var(--copper);}
  .sku-name{color:var(--copper-light);font-size:12px;font-weight:500;word-break:break-all;line-height:1.3;}
  .sku-desc{color:var(--text-dim);font-size:11px;grid-column:1/-1;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sb{font-size:9px;padding:2px 5px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-weight:500;}
  .sActive{background:var(--active-bg);color:var(--green);}
  .sExpired{background:var(--expired);color:#ffaaaa;opacity:.8;}
  .sInactive{background:var(--inactive);color:var(--yellow);}
  .sSoldOut{background:var(--sold);color:#88bbdd;}
  .snone{background:var(--surface2);color:var(--text-muted);}
  .no-res{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:12px;}

  .detail-pane{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);gap:8px;text-align:center;}
  .empty-state .big{font-size:26px;}
  .det-title{font-family:'Libre Baskerville',serif;font-size:18px;color:var(--copper-light);border-bottom:1px solid var(--border);padding-bottom:13px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .det-actions{display:flex;gap:7px;flex-shrink:0;}
  .sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
  .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}
  .fld{display:flex;flex-direction:column;gap:3px;}
  .flbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;}
  .fval{color:var(--text);font-size:12px;min-height:15px;}
  .fval.empty{color:var(--text-muted);font-style:italic;}
  .etsy-link{color:var(--copper);text-decoration:none;font-size:12px;}
  .etsy-link:hover{color:var(--copper-light);text-decoration:underline;}
  .sib-list{display:flex;flex-direction:column;gap:2px;}
  .sib-item{padding:5px 10px;background:var(--surface);border:1px solid var(--border);display:flex;gap:12px;align-items:baseline;font-size:12px;}
  .sib-item:hover{border-color:var(--copper-dim);}
  .sib-current{border-left:2px solid var(--copper)!important;background:var(--surface2)!important;}
  .sib-desc{color:var(--text-dim);}
  .sib-chain{color:var(--text-muted);font-size:11px;white-space:nowrap;}

  /* Searchable combobox for chain */
  .combo-wrap{position:relative;width:100%;}
  .combo-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--copper);z-index:300;max-height:180px;overflow-y:auto;display:none;}
  .combo-list.open{display:block;}
  .combo-opt{padding:6px 9px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text);}
  .combo-opt:hover,.combo-opt.active{background:var(--surface2);color:var(--copper);}
  .combo-empty{padding:6px 9px;font-size:11px;color:var(--text-muted);font-style:italic;}
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:12px;}
  .modal-ov.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);width:100%;max-width:700px;max-height:96vh;overflow-y:auto;display:flex;flex-direction:column;}
  .modal-hdr{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:10;}
  .modal-ttl{font-family:'Libre Baskerville',serif;color:var(--copper);font-size:14px;}
  .modal-x{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1;}
  .modal-x:hover{color:var(--text);}
  .modal-body{padding:11px 14px;flex:1;}
  .fform{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .fg{display:flex;flex-direction:column;gap:3px;}
  .fg.full{grid-column:1/-1;}
  label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
  input[type=text],textarea,select.fs{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;font-family:'DM Mono',monospace;font-size:12px;outline:none;width:100%;}
  input[type=text]:focus,textarea:focus,select.fs:focus{border-color:var(--copper);}
  input[type=text]::placeholder,textarea::placeholder{color:var(--text-muted);}
  textarea{resize:vertical;min-height:44px;}
  /* Option D: SKU fields sticky at bottom of modal */
  .modal-sku-bar{padding:8px 14px;border-top:1px solid var(--border);background:var(--surface);display:grid;grid-template-columns:1fr 1fr;gap:8px;position:sticky;bottom:48px;z-index:9;}
  .modal-ftr{padding:8px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px;position:sticky;bottom:0;background:var(--surface);z-index:10;}

  .last-updated{color:var(--text-muted);font-size:10px;white-space:nowrap;}
  #listVersion{display:none;color:var(--text-muted);font-size:9px;margin-left:6px;}

  /* Multi-select checkbox filter */
  .ms-wrap{display:flex;flex-direction:column;gap:3px;position:relative;}
  .ms-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 24px 6px 8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;text-align:left;position:relative;min-width:140px;max-width:220px;overflow:hidden;text-overflow:ellipsis;}
  .ms-btn:after{content:'▾';position:absolute;right:7px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:10px;}
  .ms-btn.active-filter{border-color:var(--copper);color:var(--copper);}
  .ms-panel{position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);z-index:150;min-width:160px;display:none;flex-direction:column;margin-top:2px;}
  .ms-panel.open{display:flex;}
  .ms-option{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;}
  .ms-option:hover{background:var(--surface2);}
  .ms-option input[type=checkbox]{accent-color:var(--copper);width:12px;height:12px;cursor:pointer;}
  .ms-clear{padding:5px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;border-top:1px solid var(--border);text-align:center;}
  .tag-input-wrap{position:relative;width:100%;}
  .tag-input-box{display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:34px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);cursor:text;}
  .tag-input-box:focus-within{border-color:var(--copper);}
  .color-tag{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);color:var(--copper-light);font-size:11px;padding:2px 7px;white-space:nowrap;}
  .color-tag-x{cursor:pointer;color:var(--text-muted);font-size:13px;line-height:1;padding:0 1px;}
  .color-tag-x:hover{color:var(--copper-light);}
  .tag-text-input{flex:1;min-width:80px;background:transparent;border:none;outline:none;color:var(--text);font-family:"DM Mono",monospace;font-size:12px;padding:2px 0;}
  .tag-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--copper);z-index:300;max-height:180px;overflow-y:auto;display:none;}
  .tag-dropdown.open{display:block;}
  .tag-drop-item{padding:6px 10px;font-size:12px;cursor:pointer;color:var(--text);}
  .tag-drop-item:hover,.tag-drop-item.active{background:var(--surface2);color:var(--copper-light);}
  .finish-panel{border:1px solid var(--border);background:var(--bg);display:grid;grid-template-rows:repeat(3,auto);grid-auto-flow:column;}
  .finish-fb-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .finish-fb-group{border:1px solid var(--border);background:var(--bg);display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto repeat(6,auto);grid-auto-flow:column;}
  .finish-fb-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--copper);padding:3px 8px;border-bottom:1px solid var(--border);grid-column:1/-1;}
  .finish-opt{display:flex;align-items:center;gap:7px;padding:4px 8px;font-size:11px;cursor:pointer;}
  .finish-opt:hover{background:var(--surface2);}
  .finish-opt input{accent-color:var(--copper);cursor:pointer;}
  .finish-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .finish-fb-toggle{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-muted);cursor:pointer;}
  .finish-fb-toggle input{accent-color:var(--copper);cursor:pointer;}

  .toast{position:fixed;bottom:18px;right:18px;background:var(--copper);color:var(--bg);padding:8px 15px;font-size:12px;font-weight:500;z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;}
  @media(max-width:700px){.toast{bottom:80px;}}
  .toast.show{transform:translateY(0);opacity:1;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);}::-webkit-scrollbar-thumb:hover{background:var(--copper-dim);}

  /* MOBILE */
  .mob-back{display:none;}
  .mob-filter-btn{display:none;}
  .mob-filter-drawer{display:none;}

  @media(max-width:700px){
    header{flex-wrap:wrap;gap:8px;padding:9px 12px;}
    .logo{font-size:13px;flex:1;}
    #appVersion{display:none;}
    #listVersion{display:inline;}
    .search-wrap{order:3;width:100%;flex:none;}
    #filterBar{display:none;flex-direction:column;gap:8px;padding:10px 12px;align-items:flex-start;background:var(--surface);border-bottom:1px solid var(--border);}
    .mob-filter-btn{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;}
    .mob-filter-btn.active-filter{border-color:var(--copper);color:var(--copper);}
    #filterBar.open{display:flex;}
    #filterBar .ms-wrap{position:static;}
    #filterBar .ms-panel{position:static;display:none;margin-top:0;border:none;background:transparent;padding-left:8px;}
    #filterBar .ms-panel.open{display:flex;}
    #filterBar .ms-btn{min-width:0;width:180px;}
    #filterBar .btn{margin-left:0;}

    /* Single pane navigation */
    .main{position:relative;}
    .list-pane{width:100%;border-right:none;}
    .detail-pane{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;}
    .detail-pane.mob-visible{display:flex;}

    #sortLabel{display:none;}
    #listSortSelect{max-width:90px;}
    /* List item -- stack on mobile using flex+order, desktop keeps grid */
    .sku-item{display:flex;flex-direction:column;}
    .sku-name{order:1;}
    .sku-desc{order:2;white-space:normal;}
    .sb{order:3;align-self:flex-start;margin-top:3px;width:auto;}
    .det-title{flex-wrap:wrap;}
    .det-actions{flex-wrap:wrap;flex-shrink:1;}
    .mob-back{display:flex;align-items:center;gap:7px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--copper);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;padding:9px 13px;flex-shrink:0;width:100%;text-align:left;}
    .mob-back:hover{background:var(--surface);}

    /* Modal full screen */
    .modal-ov{padding:0;align-items:flex-start;}
    .modal{max-width:100%;max-height:100vh;max-height:-webkit-fill-available;height:100vh;height:-webkit-fill-available;border:none;}
    .fform{grid-template-columns:1fr 1fr;}
    .finish-panel{grid-template-rows:repeat(4,auto);}
    .finish-fb-group{grid-template-columns:1fr;grid-template-rows:auto repeat(12,auto);}
  }
</style>
</head>

<script>
const APP_VERSION = 'v1.8.145';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSY-d6fqtTZhGzIoE4w_q3J4AAGpL1By7Jsc8RBVspYU6r8Fx4l71Xmx7WwR69vBwevSi63WnqJnaXO/pub?gid=1428673260&single=true&output=csv';
const FINDINGS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSY-d6fqtTZhGzIoE4w_q3J4AAGpL1By7Jsc8RBVspYU6r8Fx4l71Xmx7WwR69vBwevSi63WnqJnaXO/pub?gid=1709919881&single=true&output=csv';
const ABBREV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSY-d6fqtTZhGzIoE4w_q3J4AAGpL1By7Jsc8RBVspYU6r8Fx4l71Xmx7WwR69vBwevSi63WnqJnaXO/pub?gid=1879145246&single=true&output=csv';
const API_URL = 'https://script.google.com/macros/s/AKfycbwOZhzM_eUsSF9QuWdgblsEHVKWg2OIIGkvBC1Z6na58cGXDV3zd4ZA_nB19_caI22T/exec';

let chainOptions = [];
let pieceColorOptions = [];
let finishOptions = [];
let materialOptions = [];
let typeOptions = [];
let chainMetalMap = {}; // color name (lowercase) → chain metal abbreviation
let shapeAbbrevMap = {}; // shape full name (lowercase) → abbreviation

// Column header → internal key
const COL_MAP = {
  'Type':'type','Shape':'shape',
  'Packaging SKU':'packagingSKU','New ETSY SKU':'newEtsySKU','Characters':'characters',
  'Object Description':'objectDescription',
  'Wide x Height':'wideHeight','Wide x Height Drop':'wideHeight','Wide x\nHeight':'wideHeight',
  'Material':'material',
  'Chain Or Hardware':'chain','Chain':'chain','Chain\nOr\nHardware':'chain',
  'Chain Or Drop Length':'chainOrDropLength','Chain\nLength':'chainOrDropLength',
  'Chain/Bead/Clasp Details':'chainDetail','Additional Chain Details':'chainDetail','Chain Detail':'chainDetail',
  'Jump Rings':'jumpRings','Jump\nRings':'jumpRings',
  'Charm':'charm','Double Sided':'doubleSided','Double\nSided':'doubleSided',
  'Finish':'finish','Clear Coat':'finish','Clear\nCoat':'finish',
  'Chain Length Config':'chainConfig','Chain Config':'chainConfig',
  'Extension Chain':'extChainOption','Ext Chain Option':'extChainOption','Ext\nChain\nOption':'extChainOption',
  'Added To Etsy':'addedToEtsy','Added\nTo\nEtsy':'addedToEtsy',
  'Gift Box':'giftBox','Gift\nBox':'giftBox',
  'Colors':'pieceColors','Color Method':'colorMethod','Color':'colorMethod',
  'Features & Details':'featuresDetails',
  'Old SKU':'oldSKU',
  'ETSY_Status':'etsyStatus','ETSY Status':'etsyStatus','ETSY\nStatus':'etsyStatus',
  'ETSY_URL':'etsyURL','ETSY URL':'etsyURL',
  'ETSY ListingID':'etsyListingID',
  'ETSY SKU':'etsySKU',
  'ETSY Title':'etsyTitle',
  'ETSY Price':'etsyPrice',
  'Update Templates':'updateTemplates',
  'Template - Title Custom Intro': 'templateTitle',
  'Template - Components Necklace Length Options': 'templateComponents',
  'Template - Why You will Love it': 'templateWhyLove',
  'Template - Tags': 'templateTags',
  'Template - Combined': 'templateCombined',
  'Added_Timestamp':'addedTimestamp',
  'Row_ID':'rowId',
  'API_Edit':'apiEdit',
  'Published_Update_Timestamp':'publishedTimestamp'
};

let data=[], addedRecords=[], filtered=[], selectedIdx=null, editingId=null, listSort='default';

function normalizeHeader(h) {
  return String(h||'').replace(/\n/g,' ').replace(/\s+/g,' ').trim();
}

function resolveKey(raw) {
  const n = normalizeHeader(raw);
  if (COL_MAP[n]) return COL_MAP[n];
  for (const [k,v] of Object.entries(COL_MAP)) {
    if (normalizeHeader(k)===n) return v;
  }
  return null;
}

// Minimal CSV parser that handles quoted fields with embedded commas/newlines
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuote = false;
  for (let i=0; i<text.length; i++) {
    const c = text[i];
    if (inQuote) {
      if (c==='"') {
        if (text[i+1]==='"') { field+='"'; i++; }
        else inQuote = false;
      } else field += c;
    } else {
      if (c==='"') { inQuote=true; }
      else if (c===',') { row.push(field); field=''; }
      else if (c==='\n') { row.push(field); rows.push(row); row=[]; field=''; }
      else if (c==='\r') { /* skip */ }
      else field += c;
    }
  }
  if (field||row.length) { row.push(field); rows.push(row); }
  return rows;
}

function buildData(rows, isRefresh) {
  if (rows.length < 2) throw new Error('No data rows found.');
  const headers = rows[0];
  const keys = headers.map(h => resolveKey(h));

  const records = [];
  for (let i=1; i<rows.length; i++) {
    const row = rows[i];
    const rec = {};
    let hasData = false;
    keys.forEach((key, ci) => {
      if (!key) return;
      const v = (row[ci]||'').trim();
      rec[key] = v||null;
      if (v) hasData = true;
    });
    if (hasData && rec.packagingSKU) records.push(rec);
  }

  // Group by packagingSKU
  const map = new Map();
  records.forEach((r,i) => {
    r._id = i;
    if (!map.has(r.packagingSKU)) map.set(r.packagingSKU,[]);
    map.get(r.packagingSKU).push(r);
  });
  const primaries=[];
  map.forEach(rows=>{ const p=rows[0]; p._siblings=rows; primaries.push(p); });
  primaries.sort((a,b)=>(a.packagingSKU||'').localeCompare(b.packagingSKU||''));

  // On refresh, clear addedRecords -- CSV is now authoritative and includes all rows with Row_IDs
  if (isRefresh) {
    addedRecords = [];
    try { localStorage.removeItem('jewelry_added'); } catch(e) {}
  } else {
    addedRecords = JSON.parse(localStorage.getItem('jewelry_added')||'[]');
  }
  data = [...primaries, ...addedRecords];
  return records.length;
}

async function loadFromSheets(isRefresh) {
  // Show loading state
  if (isRefresh) {
    showToast('Refreshing from Google Sheets...');
  } else {
    document.getElementById('appScreen').style.display='none';
    document.getElementById('loadingScreen').style.display='flex';
    document.getElementById('loadError').style.display='none';
    document.getElementById('loadMsg').textContent='Loading inventory from Google Sheets...';
  }

  try {
    // Fetch with timeout helper
    const fetchWithTimeout = (url, ms=10000) => {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), ms);
      return fetch(url, {signal: controller.signal}).finally(() => clearTimeout(id));
    };

    // Fetch inventory, findings, and abbreviations in parallel
    const [resp, findingsResp, abbrevResp] = await Promise.all([
      fetchWithTimeout(SHEET_URL + '&t=' + Date.now()),
      fetchWithTimeout(FINDINGS_URL + '&t=' + Date.now()),
      fetchWithTimeout(ABBREV_URL + '&t=' + Date.now())
    ]);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — check the sheet is still published.`);
    const text = await resp.text();
    if (!text.trim()) throw new Error('Sheet returned empty data.');

    // Parse findings SKUs
    if (findingsResp.ok) {
      const findingsText = await findingsResp.text();
      const findingsRows = parseCSV(findingsText);
      if (findingsRows.length > 1) {
        const headers = findingsRows[0].map(h => (h||'').trim().toLowerCase());
        const skuIdx = headers.indexOf('sku');
        const styleIdx = headers.indexOf('style');
        const colorIdx = headers.indexOf('color');
        const includeIdx = headers.findIndex(h => h.includes('include'));
        if (skuIdx !== -1) {
          chainOptions = findingsRows.slice(1)
            .filter(r => {
              if (!r[skuIdx] || !r[skuIdx].trim()) return false;
              if (includeIdx !== -1) return (r[includeIdx]||'').trim().toLowerCase() === 'yes';
              return true;
            })
            .map(r => ({
              sku: r[skuIdx].trim(),
              style: styleIdx !== -1 && r[styleIdx] ? r[styleIdx].trim() : '',
              color: colorIdx !== -1 && r[colorIdx] ? r[colorIdx].trim() : ''
            }))
            .sort((a,b) => {
              const c = a.color.localeCompare(b.color);
              return c !== 0 ? c : a.sku.localeCompare(b.sku);
            });
        }
      }
    }

    // Parse piece color abbreviations and finish values
    if (abbrevResp.ok) {
      const abbrevText = await abbrevResp.text();
      const abbrevRows = parseCSV(abbrevText);
      if (abbrevRows.length > 1) {
        const headers = abbrevRows[0].map(h => (h||'').trim().toLowerCase());
        const typeIdx = headers.findIndex(h => h === 'type');
        const colIdx = headers.indexOf('colors');
        const finIdx = headers.findIndex(h => h.includes('finish'));
        const matIdx = headers.findIndex(h => h === 'material');
        const chainMetalIdx = headers.findIndex(h => h.includes('chain metal'));
        if (typeIdx !== -1) {
          typeOptions = abbrevRows.slice(1).map(r => (r[typeIdx]||'').trim()).filter(Boolean);
        }
        const shapeIdx = headers.findIndex(h => h === 'shape');
        if (shapeIdx !== -1) {
          abbrevRows.slice(1).forEach(r => {
            const val = (r[shapeIdx]||'').trim();
            if (val && val.includes('=')) {
              const abbr = val.split('=')[0].trim();
              const name = val.split('=').slice(1).join('=').trim().toLowerCase();
              shapeAbbrevMap[name] = abbr;
            }
          });
        }
        if (colIdx !== -1) {
          pieceColorOptions = abbrevRows.slice(1)
            .map(r => (r[colIdx]||'').trim()).filter(Boolean).sort();
        }
        if (finIdx !== -1) {
          finishOptions = abbrevRows.slice(1)
            .map(r => (r[finIdx]||'').trim()).filter(Boolean);
        }
        if (matIdx !== -1) {
          materialOptions = abbrevRows.slice(1)
            .map(r => (r[matIdx]||'').trim()).filter(Boolean).sort();
        }
        if (chainMetalIdx !== -1) {
          abbrevRows.slice(1).forEach(r => {
            const val = (r[chainMetalIdx]||'').trim();
            if (val) {
              const abbr = val.split('=')[0].trim();
              const name = val.split('=').slice(1).join('=').trim().toLowerCase();
              chainMetalMap[name] = abbr;
            }
          });
        }
      }
    }

    const rows = parseCSV(text);
    const count = buildData(rows, isRefresh);

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Updated ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    document.getElementById('totalCount').textContent = `(${data.length} SKUs)`;

    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('appScreen').style.display='flex';
    // Explicitly hide filterBar on mobile -- CSS media query alone unreliable with JS inline styles
    if (window.matchMedia('(max-width:700px)').matches) {
      document.getElementById('filterBar').style.display='none';
    }
    document.getElementById('appVersion').textContent = APP_VERSION;
    document.getElementById('listVersion').textContent = APP_VERSION;
    selectedIdx = null;
    if (!isRefresh) {
      // Default Etsy Status: Active, Inactive, Expired, No Listing
      const defaultStatuses = ['Active', 'Inactive', 'Expired', 'not listed'];
      filterState.status = defaultStatuses;
      defaultStatuses.forEach(v => {
        const cb = document.querySelector(`#panelStatus input[value="${v}"]`);
        if (cb) cb.checked = true;
      });
      document.getElementById('btnStatus').textContent = 'Active, Inactive, Expired, No Listing';
      document.getElementById('btnStatus').classList.add('active-filter');

      // Default Added To Etsy: Yes, NOT LISTED, REDO
      const defaultAdded = ['Yes', 'NOT LISTED', 'REDO'];
      filterState.added = defaultAdded;
      defaultAdded.forEach(v => {
        const cb = document.querySelector(`#panelAdded input[value="${v}"]`);
        if (cb) cb.checked = true;
      });
      document.getElementById('btnAdded').textContent = 'Yes, NOT LISTED, REDO';
      document.getElementById('btnAdded').classList.add('active-filter');
    }
    render();
    if (isRefresh) showToast(`Refreshed — ${count} rows loaded`);
  } catch(err) {
    if (isRefresh) {
      showToast('Refresh failed: ' + err.message);
    } else {
      document.getElementById('loadMsg').style.display='none';
      document.querySelector('.spinner').style.display='none';
      const errEl = document.getElementById('loadError');
      document.getElementById('loadErrorMsg').textContent = 'Could not load data: ' + err.message;
      errEl.style.display='block';
    }
  }
}

// MULTI-SELECT FILTER STATE
const filterState = { added: [], status: [], finish: [] };

function getChecked(panelId) {
  return [...document.querySelectorAll(`#${panelId} input[type=checkbox]:checked`)].map(c=>c.value);
}

function updateFilter(type) {
  const panelMap = {added:'panelAdded', status:'panelStatus', finish:'panelFinish'};
  const btnMap   = {added:'btnAdded',   status:'btnStatus',   finish:'btnFinish'};
  filterState[type] = getChecked(panelMap[type]);
  const btn = document.getElementById(btnMap[type]);
  if (filterState[type].length === 0) {
    btn.textContent = 'All';
    btn.classList.remove('active-filter');
  } else {
    btn.textContent = filterState[type].join(', ');
    btn.classList.add('active-filter');
  }
  selectedIdx = null;
  render();
}

function clearFilter(type) {
  const panelMap = {added:'panelAdded', status:'panelStatus', finish:'panelFinish'};
  document.querySelectorAll(`#${panelMap[type]} input[type=checkbox]`).forEach(c=>c.checked=false);
  updateFilter(type);
}

function togglePanel(id) {
  // Close all other panels first
  ['panelAdded','panelStatus','panelFinish'].forEach(p=>{
    if (p!==id) document.getElementById(p).classList.remove('open');

}

function setListSort(val) { listSort = val; selectedIdx = null; render(); }

// RENDER
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sf = filterState.status;
  const af = filterState.added;
  const cf = filterState.finish;

  filtered = data.filter(r=>{
    if (!r.packagingSKU) return false;
    if (q) {
      const s=[r.packagingSKU,r.newEtsySKU,r.objectDescription,r.finish,r.pieceColors,r.chain].filter(Boolean).join(' ').toLowerCase();
      const normalize = v => v.replace(/[-\s]/g,'');
      if (!s.includes(q) && !normalize(s).includes(normalize(q))) return false;
    }
    // Added To Etsy multi-select
    if (af.length > 0) {
      const hasBlank = af.includes('blank');
      const others = af.filter(v=>v!=='blank');
      const matchBlank = hasBlank && !r.addedToEtsy;
      const matchOther = others.length > 0 && others.includes(r.addedToEtsy);
      if (!matchBlank && !matchOther) return false;
    }
    // Etsy Status multi-select
    if (sf.length > 0) {
      const hasNoListing = sf.includes('not listed');
      const others = sf.filter(v=>v!=='not listed');
      const matchNoListing = hasNoListing && !r.etsyStatus;
      const matchOther = others.length > 0 && r.etsyStatus && others.some(v=>v.toLowerCase()===r.etsyStatus.toLowerCase());
      if (!matchNoListing && !matchOther) return false;
    }
    // Type filter (reusing 'finish' filter state)
    if (cf.length > 0) {
      const typeVal = (r.type||'').toUpperCase();
      const matches = cf.some(v => {
        if (v === 'SET') return typeVal.startsWith('SET-');
        return typeVal === v.toUpperCase();
      });
      if (!matches) return false;
    }
    return true;
  });

  document.getElementById('listCount').textContent = `${filtered.length} of ${data.length}`;

  // Sort filtered list
  if (listSort !== 'default') {
    // For each group, get the max apiEdit timestamp among siblings (blank = epoch 0)
    const groupTs = r => {
      const sibs = r._siblings || [r];
      const ts = sibs.map(s => s.apiEdit ? new Date(s.apiEdit).getTime() : 0);
      return Math.max(...ts);
    };
    filtered = [...filtered].sort((a, b) => {
      const ta = groupTs(a), tb = groupTs(b);
      return listSort === 'recent' ? tb - ta : ta - tb;
    });
  }

  const list = document.getElementById('listScroll');
  if (!filtered.length) { list.innerHTML='<div class="no-res">No matching SKUs</div>'; return; }

  list.innerHTML = filtered.map((r,i)=>{
    const st=r.etsyStatus||'';
    const sc=st.replace(/\s+/g,'');
    const active = selectedIdx!==null && filtered[selectedIdx]===r;
    const sibs = r._siblings || [r];
    const descs = sibs.map(s => {
        const typeEntry = typeOptions.find(o => o.split('=')[0].trim() === (s.type||'').split('-').pop());
        const typePlain = typeEntry ? typeEntry.split('=').slice(1).join('=').trim() : (s.type||'');
        const parts = [s.shape, typePlain, s.chain].filter(Boolean);
        return parts.join(' · ');
      }).filter(Boolean);
    const descHtml = descs.map(d=>`<div class="sku-desc">${d}</div>`).join('');
    return `<div class="sku-item ${active?'active':''}" onclick="selectItem(${i})" ondblclick="openEditModal(filtered[${i}]._id)">
      <div class="sku-name">${r.packagingSKU}</div>
      <div class="sb s${sc||'none'}">${st||r.addedToEtsy||'—'}</div>
      ${descHtml}
    </div>`;
  }).join('');
}

function selectItem(i) {

function f(label,v,full,pre) {

function formatSize(v) {
  if (!v) return null;
  const parts = v.split('\n').map(s=>s.trim()).filter(Boolean);
  if (parts.length === 2) return `${parts[0]} · drop: ${parts[1]}`;
  return parts[0];
}

async function runTemplates() {
  const packagingSKU = window.__currentPackagingSKU;
  if (!packagingSKU) { showToast('No SKU selected'); return; }
  const statusEl = document.getElementById('runTemplatesStatus');
  if (statusEl) statusEl.textContent = 'Running...';
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({_action: 'runTemplates', packagingSku: packagingSKU})
    });
    // no-cors means we can't read the response; re-fetch from CSV after short delay
    if (statusEl) statusEl.textContent = 'Waiting for sheet...';
    await new Promise(r => setTimeout(r, 4000));
    await loadFromSheets(true);
    // Re-display the current SKU with fresh data
    const refreshed = data.find(d => d.packagingSKU === packagingSKU);
    if (refreshed) showDetail(refreshed);
    if (statusEl) statusEl.textContent = '';
    showToast('Templates generated');
  } catch(err) {
    if (statusEl) statusEl.textContent = '';
    showToast('Run failed: ' + err.message);
  }
}

function copyTemplateCombined() {
  const text = window.__templateCombined || '';
  if (!text) { showToast('No template data'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard')).catch(() => showToast('Copy failed'));
}

      return `<div class="fg" style="${colSpan}"><label>${f.label}</label><select class="fs" id="f_${f.key}" ${isLocked?'disabled':''}>${f.options.map(o=>`<option ${o===v || o===v+'"' || o===v.replace('"','') ?'selected':''}>${o}</option>`).join('')}</select></div>`;

// State per field key: array of {abbr, fullName}
const colorTagState = {};
let colorTagActiveIdx = -1;

function initColorTags(key, initTags) {
  colorTagState[key] = initTags || [];
  renderColorTags(key);
  // Move text input inside the box
  // text input is already inside the box via HTML
}

function renderColorTags(key) {
  const box  = document.getElementById('f_' + key + '_box');
  const hidden = document.getElementById('f_' + key);
  if (!box || !hidden) return;
  const ti = document.getElementById('f_' + key + '_ti');
  // Remove existing tags (not the text input)
  [...box.querySelectorAll('.color-tag')].forEach(el => el.remove());
  const tags = colorTagState[key] || [];
  tags.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'color-tag';
    chip.innerHTML = `${t.fullName} <span class="color-tag-x" data-key="${key}" data-idx="${i}">&times;</span>`;
    box.insertBefore(chip, ti);
  });
  // Update hidden input with full names (comma-separated) -- that's what the sheet stores
  hidden.value = tags.map(t => t.fullName).join(', ');
  autoPopulateSKU();
}

function colorTagInput(input, key) {
  const q = input.value.toLowerCase().trim();
  const drop = document.getElementById('f_' + key + '_drop');
  colorTagActiveIdx = -1;
  if (!q) { closeColorDrop(key); return; }
  const current = (colorTagState[key] || []).map(t => t.abbr);
  const matches = pieceColorOptions.filter(o => {
    const abbr = o.split('=')[0].trim();
    const full = o.split('=').slice(1).join('=').trim().toLowerCase();
    return !current.includes(abbr) && (full.startsWith(q) || abbr.toLowerCase().startsWith(q));
  });
  if (!matches.length) { closeColorDrop(key); return; }
  drop.innerHTML = matches.map((o, i) => {
    const abbr = o.split('=')[0].trim();
    const full = o.split('=').slice(1).join('=').trim();
    return `<div class="tag-drop-item" data-abbr="${abbr}" data-full="${full}" data-key="${key}" onmousedown="addColorTag('${key}','${abbr}','${full.replace(/'/g,'\'')}')">${full}</div>`;
  }).join('');
  drop.classList.add('open');
}

function colorTagKeydown(e, key) {
  const drop = document.getElementById('f_' + key + '_drop');
  const items = [...drop.querySelectorAll('.tag-drop-item')];
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    colorTagActiveIdx = Math.min(colorTagActiveIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === colorTagActiveIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    colorTagActiveIdx = Math.max(colorTagActiveIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === colorTagActiveIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (colorTagActiveIdx >= 0 && items[colorTagActiveIdx]) {
      const el = items[colorTagActiveIdx];
      addColorTag(key, el.dataset.abbr, el.dataset.full);
    } else if (items.length === 1) {
      const el = items[0];
      addColorTag(key, el.dataset.abbr, el.dataset.full);
    }
  } else if (e.key === 'Backspace') {
    const ti = document.getElementById('f_' + key + '_ti');
    if (ti && ti.value === '' && colorTagState[key] && colorTagState[key].length > 0) {
      colorTagState[key].pop();
      renderColorTags(key);
    }
  } else if (e.key === 'Escape') {
    closeColorDrop(key);
  }
}

function addColorTag(key, abbr, fullName) {
  if (!colorTagState[key]) colorTagState[key] = [];
  if (!colorTagState[key].find(t => t.abbr === abbr)) {
    colorTagState[key].push({abbr, fullName});
    renderColorTags(key);
  }
  const ti = document.getElementById('f_' + key + '_ti');
  if (ti) { ti.value = ''; ti.focus(); }
  closeColorDrop(key);
}

function removeColorTag(key, idx) {
  if (colorTagState[key]) {
    colorTagState[key].splice(idx, 1);
    renderColorTags(key);
  }
}

function closeColorDrop(key) {
  const drop = document.getElementById('f_' + key + '_drop');
  if (drop) drop.classList.remove('open');
  colorTagActiveIdx = -1;
}

// Delegate tag removal clicks
document.addEventListener('click', e => {
  if (e.target.classList.contains('color-tag-x')) {
    removeColorTag(e.target.dataset.key, parseInt(e.target.dataset.idx));
  }
});

function getChainOptionsForType(typeVal) {
  const t = (typeVal||'').toUpperCase();
  const DISABLED_TYPES = ['JD','PKG'];
  const EAR_TYPES = ['ER','SET-ER'];
  const KC_TYPES  = ['KC'];
  const BR_TYPES  = ['BR','SET-BR'];
  if (DISABLED_TYPES.includes(t)) return null;
  if (EAR_TYPES.includes(t)) {
    return chainOptions.filter(o =>
      o.sku.toUpperCase().includes('EAR') || (o.style||'').toUpperCase().includes('EAR'));
  }
  if (KC_TYPES.includes(t)) {
    return chainOptions.filter(o =>
      o.sku.toLowerCase().includes('keychain') || (o.style||'').toLowerCase().includes('keychain'));
  }
  // All other types — exclude EAR, Keychain, and BRACELET options unless BR type
  return chainOptions.filter(o => {
    const skuU = o.sku.toUpperCase();
    const styleU = (o.style||'').toUpperCase();
    if (skuU.includes('EAR') || styleU.includes('EAR')) return false;
    if (o.sku.toLowerCase().includes('keychain') || (o.style||'').toLowerCase().includes('keychain')) return false;
    if ((skuU.includes('BRACELET') || styleU.includes('BRACELET')) && !BR_TYPES.includes(t)) return false;
    return true;
  });
}

// Base finish abbreviation map for fallback concatenation
const BASE_FINISH_ABBR = {
  'Flame':'FLM','Matte':'MTT','Clear':'CLR','Gloss':'GLS','Resin':'RES',
  'Solder':'SLD','Patina':'PAT','Satin':'SAT','UV Resin':'UVR',
  'Alcohol Ink':'ALK','Copper':'COP','Aluminum':'ALU'
};

function getFinishAbbr(fullName) {
  // 1. Exact match
  const exactMatch = finishOptions.find(o => o.split("=").slice(1).join("=").trim() === fullName);
  if (exactMatch) return exactMatch.split("=")[0].trim();
  // 2. Normalized match: strip (Front) from all parts, keep only (Back) annotations
  // e.g. "Flame(Front) & Matte(Front) & Resin(Back)" → "Flame & Matte(Front) & Resin(Back)"
  // Logic: if string has both (Front) and (Back), the (Front) parts that are NOT the
  // minority side should lose their annotation. Simplest correct rule:
  // strip (Front) from every part EXCEPT when a part has (Front) but no other part has (Back).
  const hasFront = fullName.includes("(Front)");
  const hasBack = fullName.includes("(Back)");
  if (hasFront && hasBack) {
    const normalized = fullName.split("&").map(p => p.replace(/\(Front\)/g, "").trim()).join(" & ");
    const normMatch = finishOptions.find(o => o.split("=").slice(1).join("=").trim() === normalized);
    if (normMatch) return normMatch.split("=")[0].trim();
  }
  // 3. Fallback: concatenate individual abbreviations
  return fullName.split("&").map(p => {
    const n = p.replace(/\(Front\)|\(Back\)/g,"").trim();
    return BASE_FINISH_ABBR[n] || n;
  }).join("");
}

function sortFinishParts(arr) {
  // Sort finish words into hardcoded canonical order.
  // Order matches Abbreviations_Published combo definitions (e.g. PM = Patina & Matte).
  // Hardcoded so sort is not dependent on finishOptions being loaded.
  if (!arr || !arr.length) return arr;
  const ORDER = ['Solder','Flame','Patina','Alcohol Ink','Heat','Copper','Clear','Gloss','Matte','Resin','UV Resin','No Finish'];
  return [...arr].sort((a, b) => {
    const ai = ORDER.indexOf(a);
    const bi = ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
}

function normalizeFinishName(fullName) {
  // Normalize a stored finish string to canonical order
  if (!fullName || fullName.includes('(Front)') || fullName.includes('(Back)')) return fullName;
  const parts = fullName.split('&').map(p => p.trim()).filter(Boolean);
  return sortFinishParts(parts).join(' & ');
}

function buildFinishFullName(sameArr, frontArr, backArr) {
  const sortByTable = arr => sortFinishParts(arr);
  if (frontArr.length || backArr.length) {
    // Front/back mode: only the LAST front item gets (Front) annotation.
    // e.g. [Flame, Matte] front + [Resin] back = Flame & Matte(Front) & Resin(Back)
    // This matches Abbreviations_Published convention (e.g. FMFR).
    const parts = [];
    const sortedFront = sortByTable(frontArr);
    sortedFront.forEach((f, i) => {
      parts.push(i === sortedFront.length - 1 ? `${f}(Front)` : f);
    });
    sortByTable(backArr).forEach(b => parts.push(`${b}(Back)`));
    return parts.join(' & ');
  }
  return sortByTable(sameArr).join(' & ');
}

function getCheckedFinishes(panelId) {
  return [...document.querySelectorAll(`.finish-cb[data-panel="${panelId}"]:checked`)].map(c=>c.value);
}

function onFinishFBToggle() {
  const tog = document.getElementById('finishFBToggle');
  const samePanel = document.getElementById('finishSamePanel');
  const fbWrap = document.getElementById('finishFBWrap');
  if (tog && tog.checked) {
    if (samePanel) samePanel.style.display = 'none';
    if (fbWrap) fbWrap.style.display = 'grid';
  } else {
    if (samePanel) samePanel.style.display = 'grid';
    if (fbWrap) fbWrap.style.display = 'none';
  }
  onFinishChange();
}

function onFinishChange() {
  // SKIP = No Finish mutual exclusivity
  const justChanged = event && event.target;
  if (justChanged && justChanged.value === 'No Finish' && justChanged.checked) {
    // No Finish checked -- uncheck everything else
    document.querySelectorAll('.finish-cb').forEach(cb => { if (cb.value !== 'No Finish') cb.checked = false; });
  } else if (justChanged && justChanged.value !== 'No Finish' && justChanged.checked) {
    // Anything else checked -- uncheck No Finish
    document.querySelectorAll('.finish-cb[value="No Finish"]').forEach(cb => cb.checked = false);
  }
  const tog = document.getElementById('finishFBToggle');
  const isFB = tog && tog.checked;
  let fullName, abbr;
  if (isFB) {
    const front = getCheckedFinishes('front');
    const back  = getCheckedFinishes('back');
    fullName = buildFinishFullName([], front, back);
  } else {
    const same = getCheckedFinishes('same');
    fullName = buildFinishFullName(same, [], []);
  }
  // Look up abbreviation
  abbr = getFinishAbbr(fullName);
  // Track new combos in memory only -- write to sheet happens on save, not on each checkbox click
  const hidden = document.getElementById('f_finish');
  if (hidden) hidden.value = fullName;
  autoPopulateSKU();
}

function toCamelCase(str) {
  return (str||'').split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
}

function getChainMetal(chainSku) {
  if (!chainSku) return '';
  const found = chainOptions.find(o => o.sku === chainSku);
  if (!found) return '';
  const colorLower = (found.color||'').toLowerCase().trim();
  // Match against chainMetalMap (built from Abbreviations_Published Chain Metal column)
  for (const [name, abbr] of Object.entries(chainMetalMap)) {
    if (colorLower.includes(name) || name.includes(colorLower)) return abbr;
  }
  return '';
}

function finishReadable(fullName) {
  // e.g. "Flame & Matte" → "FlameM", "Solder & Flame & Matte" → "SolderFM"
  if (!fullName) return '';
  const wordAbbr = {
    'flame':'F','matte':'M','clear':'C','gloss':'G','resin':'R',
    'patina':'Patina','solder':'Solder','alcohol':'Alcohol','ink':'Ink',
    'uv':'UV','satin':'Satin','copper':'Copper','aluminum':'Aluminum'
  };
  const parts = fullName.split(/\s*&\s*/).map(p => p.trim());
  return parts.map((p, i) => {
    const lower = p.toLowerCase();
    if (i === 0) {
      // First part: use full word but CamelCase-ify multi-word (e.g. "Alcohol Ink")
      return p.split(/\s+/).map((w,wi) => wi===0 ? w : (wordAbbr[w.toLowerCase()]||w)).join('');
    }
    // Subsequent parts: use abbreviation
    const words = p.split(/\s+/);
    return words.map(w => wordAbbr[w.toLowerCase()] || w).join('');
  }).join('');
}

function finishAbbr(fullName) {
  // Returns the abbreviation from finishOptions e.g. "Flame & Matte" → "FM"
  if (!fullName) return '';
  const match = finishOptions.find(o => {
    const abbr = o.split('=')[0].trim();
    const name = o.split('=').slice(1).join('=').trim();
    return abbr === fullName || name === fullName;
  });
  return match ? match.split('=')[0].trim() : fullName;
}

function isSetType(typeVal) {
  return (typeVal||'').startsWith('SET-');
}

function deriveTypeParent(typeVal) {
  // All set types use 'SET' as TypeParent prefix in SKU
  // Non-set types use their own abbreviation
  if (isSetType(typeVal)) return 'SET';
  return (typeVal||'').split('=')[0].trim() || typeVal;
}

function onTypeChange() {
  const currentRec = {};
  FIELDS.forEach(f => {
    const el = document.getElementById('f_' + f.key);
    if (el) currentRec[f.key] = el.value;
  });
  const lockedKeys = document.getElementById('f_packagingSKU') &&
    document.getElementById('f_packagingSKU').readOnly ? COMPONENT_LOCKED : null;
  buildForm(currentRec, lockedKeys);

  // Warn immediately if non-PD set type selected with no existing PD sibling
  const typeVal = currentRec.type || '';
  if (isSetType(typeVal) && !typeVal.includes('-PD')) {
    if (window.__addComponentParentId) {
      const parent = data.find(r => r._id === window.__addComponentParentId);
      const hasPD = parent && (parent._siblings||[]).some(s => (s.type||'').includes('-PD'));
      if (!hasPD) {
        alert('⚠️ No Set Pendant (SET-PD) found for this SKU.\n\nThe Packaging SKU and New ETSY SKU are driven by the pendant. Please add SET-PD first.');
      }
    } else {
      // Fresh Add New SKU — no parent context at all
      alert('⚠️ You are starting a set with a non-pendant component.\n\nPlease add SET-PD first so the Packaging SKU and New ETSY SKU can be generated correctly.');
    }
  }

  autoPopulateSKU();
}

function isSetType(typeVal) {
  return (typeVal||'').startsWith('SET-');
}

function buildSKUParts(components) {
  // components = array of {type, shape, chain, finish, pieceColors}
  // PD drives chain/finish/colors; all shapes concatenated PD first
  const pd = components.find(c => (c.type||'').includes('-PD')) || components[0];
  const typeParent = deriveTypeParent(pd.type || '');

  // Shapes — PD first, then others, deduplicate
  const shapes = [];
  const pdShape = shapeAbbrevMap[(pd.shape||'').toLowerCase().trim()] || toCamelCase(pd.shape||'');
  if (pdShape) shapes.push(pdShape);
  components.filter(c => c !== pd).forEach(c => {
    const s = shapeAbbrevMap[(c.shape||'').toLowerCase().trim()] || toCamelCase(c.shape||'');
    if (s && s !== pdShape) shapes.push(s);
  });
  const shapeStr = shapes.join('');

  const metal = getChainMetal(pd.chain||'');
  const isNoFinish = (pd.finish||'').trim() === 'No Finish';

  // CB = Chain Beads: insert after chain metal for PD/SET-PD when chainDetail contains 'bead'
  const isBeadType = ['PD','SET-PD'].includes((pd.type||'').trim());
  const hasChainBeads = isBeadType && /bead/i.test(pd.chainDetail||'');
  const chainBeads = hasChainBeads ? 'CB' : '';
  const finReadable = isNoFinish ? '' : finishReadable(pd.finish||'');
  const finShort = isNoFinish ? '' : finishAbbr(pd.finish||'');
  const colorAbbrs = (pd.pieceColors||'').split(',').map(c => {
    const stored = c.trim();
    if (!stored) return '';
    const match = pieceColorOptions.find(o => {
      const abbr = o.split('=')[0].trim();
      const full = o.split('=').slice(1).join('=').trim();
      return abbr === stored || full === stored;
    });
    return match ? match.split('=')[0].trim() : stored;
  }).filter(Boolean).slice(0, 2).join(''); // cap at first 2 colors in SKU

  const pkgBase  = [typeParent, shapeStr, metal, chainBeads, finReadable].filter(Boolean).join('-');
  const etsyBase = [typeParent, shapeStr, metal, chainBeads, finShort].filter(Boolean).join('-');

  const pkgFull  = colorAbbrs ? pkgBase  + '-' + colorAbbrs : pkgBase;
  const etsyFull = colorAbbrs ? etsyBase + '-' + colorAbbrs : etsyBase;

  return {
    pkgSKU:  pkgFull.length  <= 38 ? pkgFull  : pkgBase.slice(0, 38),
    etsySKU: etsyFull.length <= 32 ? etsyFull : etsyBase.slice(0, 32)
  };
}

function autoPopulateSKU() {
  // Don't recalculate SKU when editing an existing record
  if (editingId !== null) return;
  const typeVal   = (document.getElementById('f_type')||{}).value || '';
  const shapeVal  = (document.getElementById('f_shape')||{}).value || '';
  const chainVal  = (document.getElementById('f_chain')||{}).value || '';
  const finishVal = (document.getElementById('f_finish')||{}).value || '';
  const colorsVal = (document.getElementById('f_pieceColors')||{}).value || '';
  const chainDetailVal = (document.getElementById('f_chainDetail')||{}).value || '';

  const typeParent = deriveTypeParent(typeVal);
  let pkgSKU, etsySKU;

  if (isSetType(typeVal) && window.__addComponentParentId) {
    const parent = data.find(r => r._id === window.__addComponentParentId);
    // Component 3+: set already has a non-PD component — lock SKU to existing value
    const hasNonPD = parent && (parent._siblings||[]).some(s => !(s.type||'').includes('-PD'));
    if (parent && hasNonPD) {
      pkgSKU  = parent.packagingSKU;
      etsySKU = parent.newEtsySKU;
    } else {
      // Component 2: combine PD + current form data
      const pdComp = parent ? {
        type: parent.type || '',
        shape: parent.shape || '',
        chain: parent.chain || '',
        finish: parent.finish || '',
        pieceColors: parent.pieceColors || '',
        chainDetail: parent.chainDetail || ''
      } : null;
      const currentComp = {type: typeVal, shape: shapeVal, chain: chainVal, finish: finishVal, pieceColors: colorsVal, chainDetail: chainDetailVal};
      const components = pdComp ? [pdComp, currentComp] : [currentComp];
      ({pkgSKU, etsySKU} = buildSKUParts(components));
    }
  } else {
    ({pkgSKU, etsySKU} = buildSKUParts([{type: typeVal, shape: shapeVal, chain: chainVal, finish: finishVal, pieceColors: colorsVal, chainDetail: chainDetailVal}]));
  }

  const pkgEl  = document.getElementById('f_packagingSKU');
  const etsyEl = document.getElementById('f_newEtsySKU');
  if (pkgEl  && !pkgEl.dataset.manualEdit)  pkgEl.value  = pkgSKU;
  if (etsyEl && !etsyEl.dataset.manualEdit) etsyEl.value = etsySKU;

  // Update pkg counter
  const pkgCounter = document.getElementById('pkgCounter');
  if (pkgCounter && pkgEl) {
    const plen = pkgEl.value.length;
    pkgCounter.textContent = `${plen}/38`;
    pkgCounter.style.color = plen>38?'#e07070':plen>34?'#c8a840':'var(--text-muted)';
  }
  // Update etsy counter
  const counter = document.getElementById('skuCounter');
  if (counter && etsyEl) {
    const len = etsyEl.value.length;
    counter.textContent = `${len}/32`;
    counter.style.color = len>32?'#e07070':len>28?'#c8a840':'var(--text-muted)';
  }
}

function openEditModal(id) {
  editingId = id;
  // Search data array first, then search inside _siblings
  let rec = data.find(r => r._id === id);
  if (!rec) {
    for (const r of data) {
      if (r._siblings) {
        const sib = r._siblings.find(s => s._id === id);
        if (sib) { rec = sib; break; }
      }
    }
  }
  document.getElementById('modalTitle').textContent = 'Edit SKU';
  buildForm(rec, null);
  document.getElementById('modalOv').classList.add('open');
}

function openAddComponent(parentId) {
  editingId = null;
  window.__addComponentParentId = parentId;
  const parent = data.find(r=>r._id===parentId);
  const prefill = Object.assign({}, parent);
  COMPONENT_BLANK.forEach(k => prefill[k] = '');
  document.getElementById('modalTitle').textContent = 'Add Component to ' + parent.packagingSKU;
  buildForm(prefill, COMPONENT_LOCKED);
  document.getElementById('modalOv').classList.add('open');
}
function closeModal() { document.getElementById('modalOv').classList.remove('open'); window.__addComponentParentId=null; }

async function saveRecord() {
  const rec={};
  FIELDS.forEach(f=>{
    const el=document.getElementById('f_'+f.key);
    rec[f.key]=el?el.value.trim():'';
  });
  if (!rec.packagingSKU) { alert('Packaging SKU is required.'); return; }

  // SKU uniqueness check -- block if PKG SKU or New ETSY SKU already used by a different group
  {
    // Determine IDs belonging to the current sibling group (these are allowed to share the SKU)
    let currentGroupIds = new Set();
    if (editingId !== null) {
      // Edit mode -- find sibling group of the record being edited
      for (const r of data) {
        if (r._siblings) {
          if (r._siblings.some(s => s._id === editingId)) {
            r._siblings.forEach(s => currentGroupIds.add(s._id));
            break;
          }
        }
        if (r._id === editingId) { currentGroupIds.add(r._id); break; }
      }
    } else if (window.__addComponentParentId) {
      // Add component mode -- find parent's sibling group
      const parent = data.find(r => r._id === window.__addComponentParentId);
      if (parent) (parent._siblings || [parent]).forEach(s => currentGroupIds.add(s._id));
    }
    // Scan all records for collisions
    for (const r of data) {
      const allSibs = r._siblings || [r];
      const isCurrentGroup = allSibs.some(s => currentGroupIds.has(s._id));
      if (isCurrentGroup) continue;
      if (r.packagingSKU && r.packagingSKU === rec.packagingSKU) {
        alert(`⚠️ Packaging SKU "${rec.packagingSKU}" is already used by a different SKU. Please choose a unique name.`);
        return;
      }
      if (rec.newEtsySKU && r.newEtsySKU && r.newEtsySKU === rec.newEtsySKU) {
        alert(`⚠️ New Etsy SKU "${rec.newEtsySKU}" is already used by "${r.packagingSKU}". Please choose a unique name.`);
        return;
      }
    }
  }

  // Block save if adding a non-PD set component without a PD sibling
  if (editingId === null && isSetType(rec.type||'') && !(rec.type||'').includes('-PD') && window.__addComponentParentId) {
    const parent = data.find(r => r._id === window.__addComponentParentId);
    const hasPD = parent && (parent._siblings||[]).some(s => (s.type||'').includes('-PD'));
    if (!hasPD) {
      alert('⚠️ Cannot save — no Set Pendant (SET-PD) found for this SKU. Please add SET-PD first.');
      return;
    }
  }

  // If material is Aluminum, finish is always Aluminum regardless of checkboxes
  if (['Aluminum', 'Stainless Steel', 'Bead', 'Zinc Alloy', 'Memory Wire'].includes(rec.material)) rec.finish = 'No Finish';

  // Auto-populate characters from newEtsySKU length
  rec.characters = rec.newEtsySKU ? String(rec.newEtsySKU.length) : '';

  // Finish is already stored as full name from the checkbox UI
  // Only expand if it looks like an abbreviation (no spaces, no &)
  if (rec.finish && !rec.finish.includes('&') && !rec.finish.includes(' ')) {
    const match = finishOptions.find(o => o.split('=')[0].trim() === rec.finish);
    if (match) rec.finish = match.split('=').slice(1).join('=').trim();
  }
  // Write new finish combo to Abbreviations_Published now that finish is finalized
  if (rec.finish && rec.finish !== 'No Finish') {
    const isNewFinish = !finishOptions.some(o => o.split('=').slice(1).join('=').trim() === rec.finish);
    if (isNewFinish) {
      const abbr = getFinishAbbr(rec.finish);
      const newEntry = `${abbr} = ${rec.finish}`;
      finishOptions.push(newEntry);
      fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify({_action: 'addFinishAbbr', entry: newEntry})
      }).catch(()=>{});
    }
  }

  // Colors are already stored as full names by the tag-input widget -- no expansion needed

  if (editingId!==null) {
    // Find record - could be in data directly or inside a _siblings array
    let idx = data.findIndex(r => r._id === editingId);
    let targetRec = idx !== -1 ? data[idx] : null;
    if (!targetRec) {
      for (const r of data) {
        if (r._siblings) {
          const sib = r._siblings.find(s => s._id === editingId);
          if (sib) { targetRec = sib; break; }
        }
      }
    }
    const original = targetRec ? {...targetRec} : {};
    // Block save if no rowId -- record was added this session and not yet refreshed
    // Without rowId, Apps Script cannot reliably find the correct row to update
    if (!original.rowId) {
      alert('⚠️ This record was added in the current session and has not been refreshed yet.\n\nPlease hit Refresh first, then re-open Edit. This ensures the correct row is updated in Google Sheets.');
      return;
    }
    if (targetRec) Object.assign(targetRec, rec);
    rec._action = 'update';
    rec._rowId = original.rowId || '';
    rec.objectDescription = original.objectDescription || '';
    rec._originalDescription = original.objectDescription || '';
    rec._originalType = original.type || rec.type || '';
    rec._originalShape = original.shape || '';
    console.log('UPDATE payload:', JSON.stringify({_action: rec._action, _rowId: rec._rowId, _originalType: rec._originalType, _originalShape: rec._originalShape, packagingSKU: rec.packagingSKU}));
    try {
      const resp = await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify(rec)
      });
      // If PKG SKU changed on a SET, update all siblings in memory and sheet
      const oldPkgSKU = original.packagingSKU || "";
      if (isSetType(rec.type||"") && oldPkgSKU && oldPkgSKU !== rec.packagingSKU) {
        // Update siblings in memory
        for (const r of data) {
          if (r.packagingSKU === oldPkgSKU) { r.packagingSKU = rec.packagingSKU; r.newEtsySKU = rec.newEtsySKU; }
          if (r._siblings) r._siblings.forEach(s => { if (s.packagingSKU === oldPkgSKU) { s.packagingSKU = rec.packagingSKU; s.newEtsySKU = rec.newEtsySKU; } });
        }
        try {
          await fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {"Content-Type": "text/plain"},
            body: JSON.stringify({_action:"updateSKU",_oldPackagingSKU:oldPkgSKU,packagingSKU:rec.packagingSKU,newEtsySKU:rec.newEtsySKU})
          });
        } catch(e) { showToast("SKU sync error: " + e.message); }
      }
      closeModal(); render();
      let editedRec = data.find(r => r._id === editingId);
      if (!editedRec) {
        for (const r of data) {
          if (r._siblings) { const s = r._siblings.find(s=>s._id===editingId); if(s){editedRec=s;break;} }
        }
      }
      if (editedRec) showDetail(editedRec);
      else if (selectedIdx !== null && filtered[selectedIdx]) showDetail(filtered[selectedIdx]);
      showToast('SKU updated in Google Sheets');
    } catch(err) {
      showToast('Save failed: ' + err.message);
    }
  } else {
    // Post to Google Sheet
    showToast('Saving to Google Sheets...');
    try {
      await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify(rec)
      });
      // no-cors means we can't read the response, but if no exception it went through
      rec._id=Date.now(); rec._siblings=[rec];
      // Capture hasNonPD BEFORE adding new record to siblings
      let parentForSKU = null;
      let hasNonPDBeforeAdd = false;
      if (window.__addComponentParentId) {
        parentForSKU = data.find(r => r._id === window.__addComponentParentId);
        if (parentForSKU) {
          hasNonPDBeforeAdd = (parentForSKU._siblings||[]).some(s => s !== parentForSKU && !(s.type||'').includes('-PD'));
          parentForSKU._siblings.push(rec);
          rec._siblings = parentForSKU._siblings;
        } else {
          data.push(rec);
        }
      } else {
        const existing = data.find(r=>r.packagingSKU===rec.packagingSKU);
        if (existing) {
          existing._siblings.push(rec);
          rec._siblings = existing._siblings;
        } else {
          data.push(rec);
        }
      }
      addedRecords.push(rec);
      try { localStorage.setItem('jewelry_added',JSON.stringify(addedRecords)); } catch(e){}
      closeModal(); render();
      showToast('Saved to Google Sheets');

      // If this is set component 2, update all sibling rows with the new combined SKU
      if (isSetType(rec.type||'') && parentForSKU && !hasNonPDBeforeAdd) {
        const oldSKU = parentForSKU.packagingSKU;
        const newPkgSKU = rec.packagingSKU;
        const newEtsySKU = rec.newEtsySKU;
        if (oldSKU !== newPkgSKU) {
          // Update ALL siblings in memory, not just the parent
          (parentForSKU._siblings||[parentForSKU]).forEach(s => {
            s.packagingSKU = newPkgSKU;
            s.newEtsySKU = newEtsySKU;
          });
          try {
            await fetch(API_URL, {
              method: 'POST',
              mode: 'no-cors',
              headers: {'Content-Type': 'text/plain'},
              body: JSON.stringify({
                _action: 'updateSKU',
                _oldPackagingSKU: oldSKU,
                packagingSKU: newPkgSKU,
                newEtsySKU: newEtsySKU
              })
            });
            showToast('SKU updated on all components');
          } catch(e) { showToast('SKU update error: ' + e.message); }
        }
      }

      // Auto-open + Component form for the SKU just saved
      setTimeout(() => openAddComponent(rec._id), 300);
    } catch(err) {
      showToast('Save failed: ' + err.message);
    }
  }
}

function clearSearch() {
  document.getElementById('search').value = '';
  selectedIdx = null;
  render();
  document.getElementById('detailPane').innerHTML = '<div class="empty-state"><div class="big">◈</div><div>Select a SKU to view details</div></div>';
}

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

document.getElementById('search').addEventListener('input',()=>{selectedIdx=null;render();});
document.getElementById('modalOv').addEventListener('click',function(e){if(e.target===this && e.target.id==='modalOv' && false)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// Kick off load
loadFromSheets();
</script>
