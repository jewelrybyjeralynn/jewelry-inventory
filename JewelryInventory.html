<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewelry Inventory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
  :root {
    --bg:#1a1612;--surface:#231f1a;--surface2:#2e2923;--border:#3d3730;
    --copper:#b87333;--copper-light:#d4944a;--copper-dim:#7a4d22;
    --text:#e8ddd0;--text-dim:#9a8a7a;--text-muted:#5a4e44;
    --active-bg:#1a3d25;--expired:#7a2020;--inactive:#4a4020;--sold:#203a5a;
    --green:#4caf76;--yellow:#c8a840;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

  /* LOADING */
  #loadingScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;}
  .load-logo{font-family:'Libre Baskerville',serif;font-size:26px;color:var(--copper);}
  .load-msg{color:var(--text-muted);font-size:12px;}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--copper);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .load-error{color:#e07070;font-size:12px;background:rgba(200,50,50,.1);border:1px solid rgba(200,50,50,.3);padding:12px 18px;max-width:480px;text-align:center;line-height:1.6;display:none;}
  .retry-btn{background:var(--copper);color:var(--bg);border:none;padding:8px 18px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;margin-top:6px;}
  .retry-btn:hover{background:var(--copper-light);}

  /* APP */
  #appScreen{display:none;flex-direction:column;height:100vh;}
  header{border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;gap:14px;background:var(--surface);flex-shrink:0;}
  .logo{font-family:'Libre Baskerville',serif;font-size:15px;color:var(--copper);white-space:nowrap;}
  .logo span{color:var(--text-muted);font-size:10px;font-family:'DM Mono',monospace;margin-left:6px;}
  .search-wrap{flex:1;position:relative;}
  #search{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px 7px 28px;font-family:'DM Mono',monospace;font-size:12px;outline:none;}
  #search:focus{border-color:var(--copper);}
  #search::placeholder{color:var(--text-muted);}
  .si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;}
  .filters{display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap;}
  .filter-wrap{display:flex;flex-direction:column;gap:3px;}
  .filter-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
  select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;font-family:'DM Mono',monospace;font-size:11px;outline:none;cursor:pointer;}
  select:focus{border-color:var(--copper);}
  .btn{background:var(--copper);color:var(--bg);border:none;padding:7px 13px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .15s;}
  .btn:hover{background:var(--copper-light);}
  .btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn.sec:hover{border-color:var(--copper);color:var(--copper);}
  .btn.rel{background:transparent;color:var(--text-muted);border:1px solid var(--border);font-size:11px;}
  .btn.rel:hover{border-color:var(--copper-dim);color:var(--copper);}

  .main{display:flex;flex:1;overflow:hidden;}
  .list-pane{width:390px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .list-hdr{padding:7px 13px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:11px;background:var(--surface);display:flex;justify-content:space-between;flex-shrink:0;}
  .list-scroll{flex:1;overflow-y:auto;}
  .sku-item{padding:8px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:grid;grid-template-columns:1fr auto;gap:3px;}
  .sku-item:hover{background:var(--surface);}
  .sku-item.active{background:var(--surface2);border-left:2px solid var(--copper);}
  .sku-name{color:var(--copper-light);font-size:12px;font-weight:500;word-break:break-all;line-height:1.3;}
  .sku-desc{color:var(--text-dim);font-size:11px;grid-column:1/-1;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sb{font-size:9px;padding:2px 5px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-weight:500;}
  .sActive{background:var(--active-bg);color:var(--green);}
  .sExpired{background:var(--expired);color:#ffaaaa;opacity:.8;}
  .sInactive{background:var(--inactive);color:var(--yellow);}
  .sSoldOut{background:var(--sold);color:#88bbdd;}
  .snone{background:var(--surface2);color:var(--text-muted);}
  .no-res{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:12px;}

  .detail-pane{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);gap:8px;text-align:center;}
  .empty-state .big{font-size:26px;}
  .det-title{font-family:'Libre Baskerville',serif;font-size:18px;color:var(--copper-light);border-bottom:1px solid var(--border);padding-bottom:13px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .det-actions{display:flex;gap:7px;flex-shrink:0;}
  .sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
  .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}
  .fld{display:flex;flex-direction:column;gap:3px;}
  .flbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;}
  .fval{color:var(--text);font-size:12px;min-height:15px;}
  .fval.empty{color:var(--text-muted);font-style:italic;}
  .etsy-link{color:var(--copper);text-decoration:none;font-size:12px;}
  .etsy-link:hover{color:var(--copper-light);text-decoration:underline;}
  .sib-list{display:flex;flex-direction:column;gap:2px;}
  .sib-item{padding:5px 10px;background:var(--surface);border:1px solid var(--border);display:flex;gap:12px;align-items:baseline;font-size:12px;}
  .sib-item:hover{border-color:var(--copper-dim);}
  .sib-current{border-left:2px solid var(--copper)!important;background:var(--surface2)!important;}
  .sib-desc{color:var(--text-dim);}
  .sib-chain{color:var(--text-muted);font-size:11px;white-space:nowrap;}

  /* MODAL */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-ov.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;}
  .modal-hdr{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:10;}
  .modal-ttl{font-family:'Libre Baskerville',serif;color:var(--copper);font-size:15px;}
  .modal-x{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1;}
  .modal-x:hover{color:var(--text);}
  .modal-body{padding:17px;flex:1;}
  .fform{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .fg{display:flex;flex-direction:column;gap:4px;}
  .fg.full{grid-column:1/-1;}
  label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
  input[type=text],textarea,select.fs{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 9px;font-family:'DM Mono',monospace;font-size:12px;outline:none;width:100%;}
  input[type=text]:focus,textarea:focus,select.fs:focus{border-color:var(--copper);}
  input[type=text]::placeholder,textarea::placeholder{color:var(--text-muted);}
  textarea{resize:vertical;min-height:52px;}
  .modal-ftr{padding:11px 17px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px;position:sticky;bottom:0;background:var(--surface);}

  .last-updated{color:var(--text-muted);font-size:10px;white-space:nowrap;}

  /* Multi-select checkbox filter */
  .ms-wrap{display:flex;flex-direction:column;gap:3px;position:relative;}
  .ms-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 24px 6px 8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;text-align:left;position:relative;min-width:110px;}
  .ms-btn:after{content:'▾';position:absolute;right:7px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:10px;}
  .ms-btn.active-filter{border-color:var(--copper);color:var(--copper);}
  .ms-panel{position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);z-index:150;min-width:160px;display:none;flex-direction:column;margin-top:2px;}
  .ms-panel.open{display:flex;}
  .ms-option{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;}
  .ms-option:hover{background:var(--surface2);}
  .ms-option input[type=checkbox]{accent-color:var(--copper);width:12px;height:12px;cursor:pointer;}
  .ms-clear{padding:5px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;border-top:1px solid var(--border);text-align:center;}
  .color-panel{border:1px solid var(--border);background:var(--bg);max-height:150px;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);}
  .color-opt{display:flex;align-items:center;gap:7px;padding:4px 8px;font-size:11px;cursor:pointer;}
  .color-opt:hover{background:var(--surface2);}
  .color-opt input{accent-color:var(--copper);cursor:pointer;}

  .toast{position:fixed;bottom:18px;right:18px;background:var(--copper);color:var(--bg);padding:8px 15px;font-size:12px;font-weight:500;z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;}
  .toast.show{transform:translateY(0);opacity:1;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);}::-webkit-scrollbar-thumb:hover{background:var(--copper-dim);}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="load-logo">◈ Jewelry Inventory</div>
  <div class="spinner"></div>
  <div class="load-msg" id="loadMsg">Loading inventory from Google Sheets...</div>
  <div class="load-error" id="loadError">
    <span id="loadErrorMsg"></span><br>
    <button class="retry-btn" onclick="loadFromSheets()">Retry</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div class="logo">◈ Jewelry Inventory <span id="totalCount"></span></div>
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input type="text" id="search" placeholder="Search SKU, description, color, chain, Etsy title..." autocomplete="off">
    </div>
    <div class="filters">
      <div class="ms-wrap">
        <div class="filter-lbl">Added To Etsy</div>
        <button class="ms-btn" id="btnAdded" onclick="togglePanel('panelAdded')">All</button>
        <div class="ms-panel" id="panelAdded">
          <label class="ms-option"><input type="checkbox" value="Yes" onchange="updateFilter('added')"> Yes</label>
          <label class="ms-option"><input type="checkbox" value="SOLD" onchange="updateFilter('added')"> SOLD</label>
          <label class="ms-option"><input type="checkbox" value="NOT LISTED" onchange="updateFilter('added')"> NOT LISTED</label>
          <label class="ms-option"><input type="checkbox" value="REDO" onchange="updateFilter('added')"> REDO</label>
          <label class="ms-option"><input type="checkbox" value="blank" onchange="updateFilter('added')"> — Blank</label>
          <div class="ms-clear" onclick="clearFilter('added')">Clear</div>
        </div>
      </div>
      <div class="ms-wrap">
        <div class="filter-lbl">Etsy Status</div>
        <button class="ms-btn" id="btnStatus" onclick="togglePanel('panelStatus')">All</button>
        <div class="ms-panel" id="panelStatus">
          <label class="ms-option"><input type="checkbox" value="Active" onchange="updateFilter('status')"> Active</label>
          <label class="ms-option"><input type="checkbox" value="Inactive" onchange="updateFilter('status')"> Inactive</label>
          <label class="ms-option"><input type="checkbox" value="Expired" onchange="updateFilter('status')"> Expired</label>
          <label class="ms-option"><input type="checkbox" value="Sold Out" onchange="updateFilter('status')"> Sold Out</label>
          <label class="ms-option"><input type="checkbox" value="not listed" onchange="updateFilter('status')"> No Listing</label>
          <div class="ms-clear" onclick="clearFilter('status')">Clear</div>
        </div>
      </div>
      <div class="ms-wrap">
        <div class="filter-lbl">Finish</div>
        <button class="ms-btn" id="btnFinish" onclick="togglePanel('panelFinish')">All</button>
        <div class="ms-panel" id="panelFinish">
          <label class="ms-option"><input type="checkbox" value="Clear" onchange="updateFilter('finish')"> Clear</label>
          <label class="ms-option"><input type="checkbox" value="Gloss" onchange="updateFilter('finish')"> Gloss</label>
          <label class="ms-option"><input type="checkbox" value="Matte" onchange="updateFilter('finish')"> Matte</label>
          <label class="ms-option"><input type="checkbox" value="Resin" onchange="updateFilter('finish')"> Resin</label>
          <div class="ms-clear" onclick="clearFilter('finish')">Clear selection</div>
        </div>
      </div>
      <button class="btn" onclick="openAddModal()">+ Add SKU</button>
      <button class="btn rel" onclick="loadFromSheets(true)" title="Refresh from Google Sheets">↺ Refresh</button>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
  </header>
  <div class="main">
    <div class="list-pane">
      <div class="list-hdr"><span id="listCount"></span><span style="color:var(--text-muted);font-size:10px">click to view</span></div>
      <div class="list-scroll" id="listScroll"></div>
    </div>
    <div class="detail-pane" id="detailPane">
      <div class="empty-state"><div class="big">◈</div><div>Select a SKU to view details</div></div>
    </div>
  </div>
</div>

<div class="modal-ov" id="modalOv">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-ttl" id="modalTitle">Add New SKU</div><button class="modal-x" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div class="fform" id="formGrid"></div></div>
    <div class="modal-ftr"><button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveRecord()">Save</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSY-d6fqtTZhGzIoE4w_q3J4AAGpL1By7Jsc8RBVspYU6r8Fx4l71Xmx7WwR69vBwevSi63WnqJnaXO/pub?gid=1428673260&single=true&output=csv';
const FINDINGS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSY-d6fqtTZhGzIoE4w_q3J4AAGpL1By7Jsc8RBVspYU6r8Fx4l71Xmx7WwR69vBwevSi63WnqJnaXO/pub?gid=1709919881&single=true&output=csv';
const ABBREV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSY-d6fqtTZhGzIoE4w_q3J4AAGpL1By7Jsc8RBVspYU6r8Fx4l71Xmx7WwR69vBwevSi63WnqJnaXO/pub?gid=1879145246&single=true&output=csv';
const API_URL = 'https://script.google.com/macros/s/AKfycbwOZhzM_eUsSF9QuWdgblsEHVKWg2OIIGkvBC1Z6na58cGXDV3zd4ZA_nB19_caI22T/exec';

let chainOptions = [];
let pieceColorOptions = [];
let finishOptions = [];

// Column header → internal key
const COL_MAP = {
  'Packaging SKU':'packagingSKU','New ETSY SKU':'newEtsySKU','Characters':'characters',
  'Object Description':'objectDescription',
  'Wide x Height ; Drop':'wideHeight','Wide x Height Drop':'wideHeight','Wide x Height':'wideHeight','Wide x\nHeight':'wideHeight',
  'Chain Or Hardware':'chain','Chain':'chain','Chain\nOr\nHardware':'chain',
  'Chain Length':'chainLength','Chain\nLength':'chainLength',
  'Additional Chain Details':'chainDetail','Chain Detail':'chainDetail',
  'Jump Rings':'jumpRings','Jump\nRings':'jumpRings',
  'Jump Rings Qty':'jumpRingsQty','Jump\nRings\nQty':'jumpRingsQty',
  'Beads or Stone Details':'beadsStones','Beads Stones':'beadsStones','Beads/Stones':'beadsStones','Beads\nStones':'beadsStones',
  'Charm':'charm','Double Sided':'doubleSided','Double\nSided':'doubleSided',
  'Finish':'finish','Clear Coat':'finish','Clear\nCoat':'finish',
  'Extension Chain':'extChainOption','Ext Chain Option':'extChainOption','Ext\nChain\nOption':'extChainOption',
  'Added To Etsy':'addedToEtsy','Added\nTo\nEtsy':'addedToEtsy',
  'Gift Box':'giftBox','Gift\nBox':'giftBox',
  'Colors':'pieceColors','Color Method':'colorMethod','Color':'colorMethod',
  'Old SKU':'oldSKU',
  'ETSY_Status':'etsyStatus','ETSY Status':'etsyStatus','ETSY\nStatus':'etsyStatus',
  'ETSY_URL':'etsyURL','ETSY URL':'etsyURL',
  'Published_Update_Timestamp':'publishedTimestamp'
};

let data=[], addedRecords=[], filtered=[], selectedIdx=null, editingId=null;

function normalizeHeader(h) {
  return String(h||'').replace(/\n/g,' ').replace(/\s+/g,' ').trim();
}

function resolveKey(raw) {
  const n = normalizeHeader(raw);
  if (COL_MAP[n]) return COL_MAP[n];
  for (const [k,v] of Object.entries(COL_MAP)) {
    if (normalizeHeader(k)===n) return v;
  }
  return null;
}

// Minimal CSV parser that handles quoted fields with embedded commas/newlines
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuote = false;
  for (let i=0; i<text.length; i++) {
    const c = text[i];
    if (inQuote) {
      if (c==='"') {
        if (text[i+1]==='"') { field+='"'; i++; }
        else inQuote = false;
      } else field += c;
    } else {
      if (c==='"') { inQuote=true; }
      else if (c===',') { row.push(field); field=''; }
      else if (c==='\n') { row.push(field); rows.push(row); row=[]; field=''; }
      else if (c==='\r') { /* skip */ }
      else field += c;
    }
  }
  if (field||row.length) { row.push(field); rows.push(row); }
  return rows;
}

function buildData(rows) {
  if (rows.length < 2) throw new Error('No data rows found.');
  const headers = rows[0];
  const keys = headers.map(h => resolveKey(h));

  const records = [];
  for (let i=1; i<rows.length; i++) {
    const row = rows[i];
    const rec = {};
    let hasData = false;
    keys.forEach((key, ci) => {
      if (!key) return;
      const v = (row[ci]||'').trim();
      rec[key] = v||null;
      if (v) hasData = true;
    });
    if (hasData && rec.packagingSKU) records.push(rec);
  }

  // Group by packagingSKU
  const map = new Map();
  records.forEach((r,i) => {
    r._id = i;
    if (!map.has(r.packagingSKU)) map.set(r.packagingSKU,[]);
    map.get(r.packagingSKU).push(r);
  });
  const primaries=[];
  map.forEach(rows=>{ const p=rows[0]; p._siblings=rows; primaries.push(p); });
  primaries.sort((a,b)=>(a.packagingSKU||'').localeCompare(b.packagingSKU||''));

  addedRecords = JSON.parse(localStorage.getItem('jewelry_added')||'[]');
  data = [...primaries, ...addedRecords];
  return records.length;
}

async function loadFromSheets(isRefresh) {
  // Show loading state
  if (isRefresh) {
    showToast('Refreshing from Google Sheets...');
  } else {
    document.getElementById('appScreen').style.display='none';
    document.getElementById('loadingScreen').style.display='flex';
    document.getElementById('loadError').style.display='none';
    document.getElementById('loadMsg').textContent='Loading inventory from Google Sheets...';
  }

  try {
    // Fetch inventory, findings, and abbreviations in parallel
    const [resp, findingsResp, abbrevResp] = await Promise.all([
      fetch(SHEET_URL + '&t=' + Date.now()),
      fetch(FINDINGS_URL + '&t=' + Date.now()),
      fetch(ABBREV_URL + '&t=' + Date.now())
    ]);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — check the sheet is still published.`);
    const text = await resp.text();
    if (!text.trim()) throw new Error('Sheet returned empty data.');

    // Parse findings SKUs
    if (findingsResp.ok) {
      const findingsText = await findingsResp.text();
      const findingsRows = parseCSV(findingsText);
      if (findingsRows.length > 1) {
        const headers = findingsRows[0].map(h => (h||'').trim().toLowerCase());
        const skuIdx = headers.indexOf('sku');
        const styleIdx = headers.indexOf('style');
        const colorIdx = headers.indexOf('color');
        const includeIdx = headers.findIndex(h => h.includes('include'));
        if (skuIdx !== -1) {
          chainOptions = findingsRows.slice(1)
            .filter(r => {
              if (!r[skuIdx] || !r[skuIdx].trim()) return false;
              if (includeIdx !== -1) return (r[includeIdx]||'').trim().toLowerCase() === 'yes';
              return true;
            })
            .map(r => ({
              sku: r[skuIdx].trim(),
              style: styleIdx !== -1 && r[styleIdx] ? r[styleIdx].trim() : '',
              color: colorIdx !== -1 && r[colorIdx] ? r[colorIdx].trim() : ''
            }))
            .sort((a,b) => {
              const c = a.color.localeCompare(b.color);
              return c !== 0 ? c : a.sku.localeCompare(b.sku);
            });
        }
      }
    }

    // Parse piece color abbreviations and finish values
    if (abbrevResp.ok) {
      const abbrevText = await abbrevResp.text();
      const abbrevRows = parseCSV(abbrevText);
      if (abbrevRows.length > 1) {
        const headers = abbrevRows[0].map(h => (h||'').trim().toLowerCase());
        const colIdx = headers.indexOf('colors');
        const finIdx = headers.findIndex(h => h.includes('finish'));
        if (colIdx !== -1) {
          pieceColorOptions = abbrevRows.slice(1)
            .map(r => (r[colIdx]||'').trim())
            .filter(Boolean)
            .sort();
        }
        if (finIdx !== -1) {
          finishOptions = abbrevRows.slice(1)
            .map(r => (r[finIdx]||'').trim())
            .filter(Boolean);
        }
      }
    }

    const rows = parseCSV(text);
    const count = buildData(rows);

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Updated ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    document.getElementById('totalCount').textContent = `(${data.length} SKUs)`;

    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('appScreen').style.display='flex';
    selectedIdx = null;
    if (!isRefresh) {
      // Default Etsy Status: Active, Inactive, Expired, No Listing
      const defaultStatuses = ['Active', 'Inactive', 'Expired', 'not listed'];
      filterState.status = defaultStatuses;
      defaultStatuses.forEach(v => {
        const cb = document.querySelector(`#panelStatus input[value="${v}"]`);
        if (cb) cb.checked = true;
      });
      document.getElementById('btnStatus').textContent = 'Active, Inactive, Expired, No Listing';
      document.getElementById('btnStatus').classList.add('active-filter');

      // Default Added To Etsy: Yes, NOT LISTED, REDO
      const defaultAdded = ['Yes', 'NOT LISTED', 'REDO'];
      filterState.added = defaultAdded;
      defaultAdded.forEach(v => {
        const cb = document.querySelector(`#panelAdded input[value="${v}"]`);
        if (cb) cb.checked = true;
      });
      document.getElementById('btnAdded').textContent = 'Yes, NOT LISTED, REDO';
      document.getElementById('btnAdded').classList.add('active-filter');
    }
    render();
    if (isRefresh) showToast(`Refreshed — ${count} rows loaded`);
  } catch(err) {
    if (isRefresh) {
      showToast('Refresh failed: ' + err.message);
    } else {
      document.getElementById('loadMsg').style.display='none';
      document.querySelector('.spinner').style.display='none';
      const errEl = document.getElementById('loadError');
      document.getElementById('loadErrorMsg').textContent = 'Could not load data: ' + err.message;
      errEl.style.display='block';
    }
  }
}

// MULTI-SELECT FILTER STATE
const filterState = { added: [], status: [], finish: [] };

function getChecked(panelId) {
  return [...document.querySelectorAll(`#${panelId} input[type=checkbox]:checked`)].map(c=>c.value);
}

function updateFilter(type) {
  const panelMap = {added:'panelAdded', status:'panelStatus', finish:'panelFinish'};
  const btnMap   = {added:'btnAdded',   status:'btnStatus',   finish:'btnFinish'};
  filterState[type] = getChecked(panelMap[type]);
  const btn = document.getElementById(btnMap[type]);
  if (filterState[type].length === 0) {
    btn.textContent = 'All';
    btn.classList.remove('active-filter');
  } else {
    btn.textContent = filterState[type].join(', ');
    btn.classList.add('active-filter');
  }
  selectedIdx = null;
  render();
}

function clearFilter(type) {
  const panelMap = {added:'panelAdded', status:'panelStatus', finish:'panelFinish'};
  document.querySelectorAll(`#${panelMap[type]} input[type=checkbox]`).forEach(c=>c.checked=false);
  updateFilter(type);
}

function togglePanel(id) {
  // Close all other panels first
  ['panelAdded','panelStatus','panelFinish'].forEach(p=>{
    if (p!==id) document.getElementById(p).classList.remove('open');
  });
  document.getElementById(id).classList.toggle('open');
}

// Close panels when clicking outside
document.addEventListener('click', e=>{
  if (!e.target.closest('.ms-wrap')) {
    ['panelAdded','panelStatus','panelFinish'].forEach(p=>document.getElementById(p).classList.remove('open'));
  }
});

// RENDER
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sf = filterState.status;
  const af = filterState.added;
  const cf = filterState.finish;

  filtered = data.filter(r=>{
    if (!r.packagingSKU) return false;
    if (q) {
      const s=[r.packagingSKU,r.newEtsySKU,r.objectDescription,r.finish,r.pieceColors,r.chain,r.beadsStones,r.oldSKU].filter(Boolean).join(' ').toLowerCase();
      if (!s.includes(q)) return false;
    }
    // Added To Etsy multi-select
    if (af.length > 0) {
      const hasBlank = af.includes('blank');
      const others = af.filter(v=>v!=='blank');
      const matchBlank = hasBlank && !r.addedToEtsy;
      const matchOther = others.length > 0 && others.includes(r.addedToEtsy);
      if (!matchBlank && !matchOther) return false;
    }
    // Etsy Status multi-select
    if (sf.length > 0) {
      const hasNoListing = sf.includes('not listed');
      const others = sf.filter(v=>v!=='not listed');
      const matchNoListing = hasNoListing && !r.etsyStatus;
      const matchOther = others.length > 0 && r.etsyStatus && others.some(v=>v.toLowerCase()===r.etsyStatus.toLowerCase());
      if (!matchNoListing && !matchOther) return false;
    }
    // Finish multi-select (contains match)
    if (cf.length > 0) {
      const finVal = (r.finish||'').toLowerCase();
      if (!cf.some(v=>finVal.includes(v.toLowerCase()))) return false;
    }
    return true;
  });

  document.getElementById('listCount').textContent = `${filtered.length} of ${data.length}`;

  const list = document.getElementById('listScroll');
  if (!filtered.length) { list.innerHTML='<div class="no-res">No matching SKUs</div>'; return; }

  list.innerHTML = filtered.map((r,i)=>{
    const st=r.etsyStatus||'';
    const sc=st.replace(/\s+/g,'');
    const active = selectedIdx!==null && filtered[selectedIdx]===r;
    const sibs = r._siblings || [r];
    const descs = sibs.map(s=>s.objectDescription).filter(Boolean);
    const descHtml = descs.map(d=>`<div class="sku-desc">${d}</div>`).join('');
    return `<div class="sku-item ${active?'active':''}" onclick="selectItem(${i})">
      <div class="sku-name">${r.packagingSKU}</div>
      <div class="sb s${sc||'none'}">${st||r.addedToEtsy||'—'}</div>
      ${descHtml}
    </div>`;
  }).join('');
}

function selectItem(i) { selectedIdx=i; render(); showDetail(filtered[i]); }

function f(label,v,full) {
  return `<div class="fld"${full?' style="grid-column:1/-1"':''}>
    <div class="flbl">${label}</div>
    <div class="fval ${v?'':'empty'}">${v||'—'}</div>
  </div>`;
}

function formatSize(v) {
  if (!v) return null;
  const parts = v.split('\n').map(s=>s.trim()).filter(Boolean);
  if (parts.length === 2) return `${parts[0]} · drop: ${parts[1]}`;
  return parts[0];
}

function showDetail(r, sibIdx) {
  // Always get the full sibling group from the primary record
  const primary = data.find(d => d.packagingSKU === r.packagingSKU && d._siblings) || r;
  const sibs = primary._siblings || [r];
  window.__sibs = sibs;
  // The record to display is the requested one (default to first)
  const displayRec = sibIdx !== undefined ? sibs[sibIdx] : (sibs.includes(r) ? r : sibs[0]);
  const hasEtsy = displayRec.etsyURL;
  document.getElementById('detailPane').innerHTML=`
    <div class="det-title">
      <div>${primary.packagingSKU}</div>
      <div class="det-actions">
        ${hasEtsy?`<a href="${displayRec.etsyURL}" target="_blank" class="btn sec" style="text-decoration:none;font-size:11px">Open in Etsy ↗</a>`:''}
        <button class="btn sec" onclick="openAddComponent(${primary._id})">+ Component</button>
        <button class="btn sec" onclick="openEditModal(${displayRec._id})">Edit</button>
      </div>
    </div>
    <div><div class="sec-lbl">Physical Details</div><div class="fgrid">
      ${f('Description',displayRec.objectDescription)}${f('Wide x Height ; Drop',formatSize(displayRec.wideHeight))}
      ${f('Finish',displayRec.finish)}${f('Colors',displayRec.pieceColors)}
      ${f('Double Sided',displayRec.doubleSided)}${f('Charm',displayRec.charm)}
      ${f('Beads / Stones',displayRec.beadsStones)}
    </div></div>
    <div><div class="sec-lbl">Chain & Hardware</div><div class="fgrid">
      ${f('Chain Or Hardware',displayRec.chain)}${f('Chain Length',displayRec.chainLength)}
      ${f('Additional Chain Details',displayRec.chainDetail)}${f('Beads or Stone Details',displayRec.beadsStones)}
      ${f('Jump Rings',displayRec.jumpRings)}${f('Jump Ring Qty',displayRec.jumpRingsQty)}${f('Extension Chain',displayRec.extChainOption)}
    </div></div>
    <div><div class="sec-lbl">Etsy Listing</div><div class="fgrid">
      ${f('New Etsy SKU',displayRec.newEtsySKU)}
      ${f('Status',displayRec.etsyStatus)}
      ${f('Added to Etsy',displayRec.addedToEtsy)}
      ${hasEtsy?`<div class="fld"><div class="flbl">Etsy URL</div><a href="${displayRec.etsyURL}" target="_blank" class="etsy-link">View listing ↗</a></div>`:''}
    </div></div>
    ${sibs.length>1?`<div><div class="sec-lbl">SKU Group Components (${sibs.length}) — click to view/edit</div><div class="sib-list">
      ${sibs.map((s,si)=>{
        const chainInfo = [s.chain, s.chainLength ? s.chainLength+'"' : null, formatSize(s.wideHeight)].filter(Boolean).join(' · ');
        const isCurrent = s === displayRec;
        return `<div class="sib-item ${isCurrent?'sib-current':''}" onclick="showDetail(window.__sibs[0],${si})" style="cursor:pointer">
          <span class="sib-desc">${s.objectDescription||'—'}</span>
          ${chainInfo ? `<span class="sib-chain">${chainInfo}</span>` : ''}
        </div>`;
      }).join('')}
    </div></div>`:''}
    <div><div class="sec-lbl">Reference</div><div class="fgrid">
      ${f('Old SKU',displayRec.oldSKU)}${f('Characters',displayRec.characters)}
    </div></div>`;
}

// FORM
const FIELDS=[
  {key:'packagingSKU',label:'Packaging SKU',required:true},
  {key:'newEtsySKU',label:'New Etsy SKU'},
  {key:'objectDescription',label:'Object Description',full:true},
  {key:'wideHeight',label:'Wide x Height ; Drop'},
  {key:'finish',label:'Finish',type:'finish'},
  {key:'chain',label:'Chain Or Hardware',type:'chain'},
  {key:'chainLength',label:'Chain Length'},
  {key:'chainDetail',label:'Additional Chain Details (example: beads)'},
  {key:'extChainOption',label:'Extension Chain',type:'sel',options:['','0"','1"','1.5"','2"']},
  {key:'beadsStones',label:'Beads or Stone Details'},
  {key:'pieceColors',label:'Colors',type:'multicolors'},
  {key:'charm',label:'Charm',type:'sel',options:['No','Yes'],default:'No'},
  {key:'doubleSided',label:'Double Sided',type:'sel',options:['No','Yes'],default:'No'},
  {key:'giftBox',label:'Gift Box'}
];

const COMPONENT_BLANK = ['objectDescription','wideHeight','chain','chainDetail','chainLength','beadsStones','charm','doubleSided','finish','extChainOption','pieceColors'];
const COMPONENT_LOCKED = ['packagingSKU','newEtsySKU'];

function buildForm(rec, lockedKeys) {
  document.getElementById('formGrid').innerHTML=FIELDS.map(f=>{
    const defaultVal = f.default || '';
    const v = rec ? (rec[f.key] || defaultVal) : defaultVal;
    const isLocked = lockedKeys && lockedKeys.includes(f.key);
    if (f.key==='newEtsySKU') {
      const len = v.length;
      const color = len>32?'#e07070':len>28?'#c8a840':'var(--text-muted)';
      return `<div class="fg" style="grid-column:1/-1">
        <label style="display:flex;justify-content:space-between">
          <span>New Etsy SKU</span>
          <span id="skuCounter" style="color:${color};font-weight:500">${len}/32</span>
        </label>
        <input type="text" id="f_newEtsySKU" value="${v?v.replace(/"/g,'&quot;'):''}" placeholder="New Etsy SKU" maxlength="40" ${isLocked?'readonly style="opacity:0.5;cursor:not-allowed"':''}>
      </div>`;
    }
    if (f.type==='finish') {
      const opts = ['<option value=""></option>', ...finishOptions.map(o => {
        const abbr = o.split('=')[0].trim();
        const fullName = o.split('=').slice(1).join('=').trim();
        const selected = abbr===v || fullName===v || o===v ? 'selected' : '';
        return `<option value="${abbr}" ${selected}>${o}</option>`;
      })].join('');
      return `<div class="fg ${f.full?'full':''}"><label>${f.label}</label><select class="fs" id="f_${f.key}" ${isLocked?'disabled':''}>${opts}</select></div>`;
    }
    if (f.type==='multicolors') {
      const selectedRaw = v ? v.split(',').map(s=>s.trim()) : [];
      const checkboxes = pieceColorOptions.map(o => {
        const abbr = o.split('=')[0].trim();
        const fullName = o.split('=').slice(1).join('=').trim();
        // Match on abbreviation OR full name (handles both old and new stored values)
        const checked = selectedRaw.includes(abbr) || selectedRaw.includes(fullName) ? 'checked' : '';
        return `<label class="color-opt"><input type="checkbox" class="color-cb" value="${abbr}" ${checked}> ${o}</label>`;
      }).join('');
      return `<div class="fg ${f.full?'full':''}" style="grid-column:1/-1">
        <label>${f.label}</label>
        <div class="color-panel" id="f_${f.key}_panel">${checkboxes}</div>
        <input type="hidden" id="f_${f.key}" value="${v}">
      </div>`;
    }
    if (f.type==='colors') {
      const opts = ['<option value=""></option>', ...pieceColorOptions.map(o => {
        const abbr = o.split('=')[0].trim();
        const selected = abbr===v || o===v ? 'selected' : '';
        return `<option value="${abbr}" ${selected}>${o}</option>`;
      })].join('');
      return `<div class="fg ${f.full?'full':''}"><label>${f.label}</label><select class="fs" id="f_${f.key}" ${isLocked?'disabled':''}>${opts}</select></div>`;
    }
    if (f.type==='chain') {
      const opts = ['<option value=""></option>', ...chainOptions.map(o => {
        const parts = [o.color, o.sku, o.style].filter(Boolean);
        const label = parts.join(' — ');
        const selected = o.sku===v ? 'selected' : '';
        return `<option value="${o.sku}" ${selected}>${label}</option>`;
      })].join('');
      return `<div class="fg ${f.full?'full':''}"><label>${f.label}</label><select class="fs" id="f_${f.key}" ${isLocked?'disabled':''}>${opts}</select></div>`;
    }
    if (f.type==='sel') return `<div class="fg ${f.full?'full':''}"><label>${f.label}</label><select class="fs" id="f_${f.key}" ${isLocked?'disabled':''}>${f.options.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select></div>`;
    return `<div class="fg ${f.full?'full':''}"><label>${f.label}${f.required?' *':''}</label><input type="text" id="f_${f.key}" value="${v?v.replace(/"/g,'&quot;'):''}" placeholder="${f.label}" ${isLocked?'readonly style="opacity:0.5;cursor:not-allowed"':''}></div>`;
  }).join('');

  // Wire up live counter
  const skuInput = document.getElementById('f_newEtsySKU');
  if (skuInput) {
    skuInput.addEventListener('input', () => {
      const len = skuInput.value.length;
      const counter = document.getElementById('skuCounter');
      counter.textContent = `${len}/32`;
      counter.style.color = len>32?'#e07070':len>28?'#c8a840':'var(--text-muted)';
    });
  }
  // Wire up color checkboxes to hidden input
  const colorPanel = document.getElementById('f_pieceColors_panel');
  if (colorPanel) {
    colorPanel.addEventListener('change', () => {
      const checked = [...colorPanel.querySelectorAll('.color-cb:checked')].map(c=>c.value);
      document.getElementById('f_pieceColors').value = checked.join(', ');
    });
  }
}

function openAddModal() { editingId=null; document.getElementById('modalTitle').textContent='Add New SKU'; buildForm(null, null); document.getElementById('modalOv').classList.add('open'); }
function openEditModal(id) {
  editingId = id;
  // Search data array first, then search inside _siblings
  let rec = data.find(r => r._id === id);
  if (!rec) {
    for (const r of data) {
      if (r._siblings) {
        const sib = r._siblings.find(s => s._id === id);
        if (sib) { rec = sib; break; }
      }
    }
  }
  document.getElementById('modalTitle').textContent = 'Edit SKU';
  buildForm(rec, null);
  document.getElementById('modalOv').classList.add('open');
}

function openAddComponent(parentId) {
  editingId = null;
  const parent = data.find(r=>r._id===parentId);
  // Pre-fill from parent, blank out component-specific fields
  const prefill = Object.assign({}, parent);
  COMPONENT_BLANK.forEach(k => prefill[k] = '');
  document.getElementById('modalTitle').textContent = 'Add Component to ' + parent.packagingSKU;
  buildForm(prefill, COMPONENT_LOCKED);
  document.getElementById('modalOv').classList.add('open');
}
function closeModal() { document.getElementById('modalOv').classList.remove('open'); }

async function saveRecord() {
  const rec={};
  FIELDS.forEach(f=>{
    const el=document.getElementById('f_'+f.key);
    rec[f.key]=el?el.value.trim():'';
  });
  if (!rec.packagingSKU) { alert('Packaging SKU is required.'); return; }

  // Auto-populate characters from newEtsySKU length
  rec.characters = rec.newEtsySKU ? String(rec.newEtsySKU.length) : '';

  // Expand finish abbreviation to full name (e.g. FM → Flame & Matte)
  if (rec.finish) {
    const match = finishOptions.find(o => o.split('=')[0].trim() === rec.finish);
    if (match) rec.finish = match.split('=').slice(1).join('=').trim();
  }

  // Expand color abbreviations to full names, comma separated
  if (rec.pieceColors) {
    rec.pieceColors = rec.pieceColors.split(',').map(abbr => {
      const a = abbr.trim();
      const match = pieceColorOptions.find(o => o.split('=')[0].trim() === a);
      return match ? match.split('=').slice(1).join('=').trim() : a;
    }).join(', ');
  }

  if (editingId!==null) {
    // Find record - could be in data directly or inside a _siblings array
    let idx = data.findIndex(r => r._id === editingId);
    let targetRec = idx !== -1 ? data[idx] : null;
    if (!targetRec) {
      for (const r of data) {
        if (r._siblings) {
          const sib = r._siblings.find(s => s._id === editingId);
          if (sib) { targetRec = sib; break; }
        }
      }
    }
    const original = targetRec ? {...targetRec} : {};
    if (targetRec) Object.assign(targetRec, rec);
    rec._action = 'update';
    rec._originalDescription = original.objectDescription || rec.objectDescription;
    try {
      const resp = await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify(rec)
      });
      const result = await resp.json();
      if (result.status === 'error') {
        showToast('Update failed: ' + result.message);
      } else {
        closeModal(); render();
        // Refresh detail view if this SKU is currently selected
        if (selectedIdx !== null && filtered[selectedIdx]) showDetail(filtered[selectedIdx]);
        showToast('SKU updated in Google Sheets');
      }
    } catch(err) {
      // If CORS fails fall back to no-cors
      await fetch(API_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(rec)});
      closeModal(); render();
      if (selectedIdx !== null && filtered[selectedIdx]) showDetail(filtered[selectedIdx]);
      showToast('SKU updated');
    }
  } else {
    // Post to Google Sheet
    showToast('Saving to Google Sheets...');
    try {
      await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify(rec)
      });
      // no-cors means we can't read the response, but if no exception it went through
      rec._id=Date.now(); rec._siblings=[rec];
      const existing = data.find(r=>r.packagingSKU===rec.packagingSKU);
      if (existing) {
        existing._siblings.push(rec);
        rec._siblings = existing._siblings;
      } else {
        data.push(rec);
      }
      addedRecords.push(rec);
      try { localStorage.setItem('jewelry_added',JSON.stringify(addedRecords)); } catch(e){}
      closeModal(); render();
      showToast('Saved to Google Sheets');
      // Auto-open + Component form for the SKU just saved
      setTimeout(() => openAddComponent(rec._id), 300);
    } catch(err) {
      showToast('Save failed: ' + err.message);
    }
  }
}

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

document.getElementById('search').addEventListener('input',()=>{selectedIdx=null;render();});
document.getElementById('modalOv').addEventListener('click',function(e){if(e.target===this && e.target.id==='modalOv' && false)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// Kick off load
loadFromSheets();
